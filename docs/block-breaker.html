<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ブロック崩し</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-page">
      <section class="game-screen">
        <div class="game-layout">
          <div class="play-panel">
            <div class="game-shell">
              <canvas id="gameCanvas" width="480" height="560" aria-label="ブロック崩しゲーム"></canvas>
            </div>
          </div>

          <div class="info-panel">
            <h1>BreakSphere</h1>
            <p class="description">
              スペースキーで球を発射し、矢印キーで板を左右に動かして、上のブロックをすべて崩しましょう。
            </p>

            <div class="hud" aria-live="polite">
              <div class="hud-row">
                <div class="hud-stat">
                  <span id="score">スコア: 0</span>
                </div>
                <div class="hud-status" id="status">スペースでスタート</div>
              </div>
              <div class="hud-row">
                <div class="hud-stat">
                  <span id="lives">残機: 3</span>
                </div>
                <div class="hud-status hud-status-secondary">準備中</div>
              </div>
            </div>

            <a class="secondary-button" href="index.html">トップに戻る</a>
          </div>
        </div>
      </section>
    </main>

    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");

      const scoreEl = document.getElementById("score");
      const statusEl = document.getElementById("status");
      const livesEl = document.getElementById("lives");

      const keys = {
        ArrowLeft: false,
        ArrowRight: false,
      };

      const gameState = {
        score: 0,
        lives: 3,
        gameOver: false,
        won: false,
        launched: false,
        piercingActive: false,
        fireworksTimer: 0,
        gameOverTimer: 0,
        overlayOffset: 0,
        collectedItems: [],
      };

      const paddle = {
        x: 195,
        y: 500,
        width: 90,
        height: 14,
        speed: 7,
        baseWidth: 90,
      };

      const balls = [];
      const bricks = [];
      const items = [];
      const fireworks = [];
      const gameOverParticles = [];
      const brickSettings = {
        rowCount: 6,
        columnCount: 10,
        width: 36,
        height: 15,
        padding: 6,
        offsetTop: 40,
        offsetLeft: 16,
      };

      const itemTypes = ["extraBall", "piercing", "paddleGrow", "paddleShrink", "life"];

      function createBall() {
        const ball = {
          x: paddle.x + paddle.width / 2,
          y: paddle.y - 6 - 2,
          radius: 6,
          dx: (Math.random() > 0.5 ? 1 : -1) * 3,
          dy: -3,
          launched: gameState.launched,
          pierced: gameState.piercingActive,
          color: gameState.piercingActive ? "#fb923c" : "#fbbf24",
        };

        if (!gameState.launched) {
          ball.launched = false;
        }

        return ball;
      }

      function resetBalls() {
        balls.length = 0;
        const initialBall = createBall();
        initialBall.launched = false;
        initialBall.x = paddle.x + paddle.width / 2;
        initialBall.y = paddle.y - initialBall.radius - 2;
        initialBall.dx = (Math.random() > 0.5 ? 1 : -1) * 3;
        initialBall.dy = -3;
        balls.push(initialBall);
      }

      function createBricks() {
        bricks.length = 0;
        for (let row = 0; row < brickSettings.rowCount; row += 1) {
          for (let col = 0; col < brickSettings.columnCount; col += 1) {
            const brick = {
              x: col * (brickSettings.width + brickSettings.padding) + brickSettings.offsetLeft,
              y: row * (brickSettings.height + brickSettings.padding) + brickSettings.offsetTop,
              width: brickSettings.width,
              height: brickSettings.height,
              alive: true,
              color: ["#38bdf8", "#22c55e", "#f59e0b", "#f43f5e", "#a78bfa"][row % 5],
              itemType: Math.random() < 0.14 ? itemTypes[Math.floor(Math.random() * itemTypes.length)] : null,
            };
            bricks.push(brick);
          }
        }
      }

      function updateHud() {
        scoreEl.textContent = `スコア: ${gameState.score}`;
        livesEl.textContent = `残機: ${gameState.lives}`;
      }

      function updateStatus(text) {
        statusEl.textContent = text;
      }

      function updateItemInventory() {
        const secondaryStatus = document.querySelector(".hud-status-secondary");
        if (!secondaryStatus) {
          return;
        }

        if (gameState.collectedItems.length === 0) {
          secondaryStatus.textContent = "準備中";
          return;
        }

        const icons = gameState.collectedItems.map((item) => {
          if (item === "extraBall") return "●";
          if (item === "piercing") return "⬢";
          if (item === "paddleGrow") return "＋";
          if (item === "paddleShrink") return "－";
          if (item === "life") return "♥";
          return "•";
        });

        secondaryStatus.textContent = icons.join(" ");
      }

      function resetGame() {
        gameState.score = 0;
        gameState.lives = 3;
        gameState.gameOver = false;
        gameState.won = false;
        gameState.launched = false;
        gameState.piercingActive = false;
        gameState.fireworksTimer = 0;
        gameState.gameOverTimer = 0;
        gameState.overlayOffset = 0;
        gameState.collectedItems = [];
        items.length = 0;
        fireworks.length = 0;
        gameOverParticles.length = 0;
        createBricks();
        paddle.x = 195;
        paddle.width = paddle.baseWidth;
        resetBalls();
        updateHud();
        updateStatus("スペースでスタート");
        updateItemInventory();
      }

      function startWinEffect() {
        gameState.won = true;
        gameState.launched = false;
        fireworks.length = 0;
        updateStatus("クリア！");
        for (let i = 0; i < 28; i += 1) {
          fireworks.push({
            x: 120 + Math.random() * 240,
            y: 90 + Math.random() * 80,
            vx: (Math.random() - 0.5) * 3.2,
            vy: (Math.random() - 0.7) * 3.2,
            life: 50 + Math.random() * 40,
            maxLife: 90,
            size: 2 + Math.random() * 2.5,
            color: ["#fef3c7", "#fda4af", "#93c5fd", "#86efac", "#fde68a"][Math.floor(Math.random() * 5)],
          });
        }
      }

      function startGameOverEffect() {
        gameState.gameOver = true;
        gameState.launched = false;
        gameOverParticles.length = 0;
        updateStatus("ゲームオーバー");
        for (let i = 0; i < 54; i += 1) {
          gameOverParticles.push({
            x: canvas.width / 2,
            y: canvas.height / 2 - 30,
            vx: (Math.random() - 0.5) * 4.2,
            vy: (Math.random() - 0.5) * 4.2,
            life: 45 + Math.random() * 30,
            maxLife: 75,
            size: 2 + Math.random() * 3,
            color: ["#fda4af", "#fb923c", "#fbbf24", "#f8fafc"][Math.floor(Math.random() * 4)],
          });
        }
      }

      function updateEffects() {
        if (gameState.won) {
          gameState.fireworksTimer += 1;
          if (gameState.fireworksTimer % 5 === 0) {
            for (let i = 0; i < 10; i += 1) {
              fireworks.push({
                x: 120 + Math.random() * 240,
                y: 90 + Math.random() * 80,
                vx: (Math.random() - 0.5) * 3.2,
                vy: (Math.random() - 0.7) * 3.2,
                life: 50 + Math.random() * 40,
                maxLife: 90,
                size: 2 + Math.random() * 2.5,
                color: ["#fef3c7", "#fda4af", "#93c5fd", "#86efac", "#fde68a"][Math.floor(Math.random() * 5)],
              });
            }
          }

          for (let i = fireworks.length - 1; i >= 0; i -= 1) {
            const particle = fireworks[i];
            particle.x += particle.vx;
            particle.y += particle.vy;
            particle.vy += 0.02;
            particle.life -= 1;
            if (particle.life <= 0) {
              fireworks.splice(i, 1);
            }
          }
        }

        if (gameState.gameOver) {
          gameState.gameOverTimer += 1;
          gameState.overlayOffset = (Math.random() - 0.5) * 8;
          if (gameState.gameOverTimer % 3 === 0) {
            for (let i = 0; i < 6; i += 1) {
              gameOverParticles.push({
                x: canvas.width / 2,
                y: canvas.height / 2 - 30,
                vx: (Math.random() - 0.5) * 4.2,
                vy: (Math.random() - 0.5) * 4.2,
                life: 45 + Math.random() * 30,
                maxLife: 75,
                size: 2 + Math.random() * 3,
                color: ["#fda4af", "#fb923c", "#fbbf24", "#f8fafc"][Math.floor(Math.random() * 4)],
              });
            }
          }

          for (let i = gameOverParticles.length - 1; i >= 0; i -= 1) {
            const particle = gameOverParticles[i];
            particle.x += particle.vx;
            particle.y += particle.vy;
            particle.vy += 0.04;
            particle.life -= 1;
            if (particle.life <= 0) {
              gameOverParticles.splice(i, 1);
            }
          }
        }
      }

      function handleLifeLost() {
        gameState.lives -= 1;
        updateHud();
        if (gameState.lives <= 0) {
          startGameOverEffect();
        } else {
          gameState.launched = false;
          items.length = 0;
          resetBalls();
          updateStatus("残機が減りました。スペースで再スタート");
        }
      }

      function spawnItemFromBrick(brick) {
        if (!brick.itemType) {
          return;
        }

        items.push({
          x: brick.x + brick.width / 2,
          y: brick.y + brick.height / 2,
          width: 20,
          height: 20,
          type: brick.itemType,
          speed: 2.2,
        });
      }

      function applyItemEffect(type) {
        if (type === "extraBall") {
          if (!gameState.collectedItems.includes("extraBall")) {
            gameState.collectedItems.push("extraBall");
          }
          const extraBall = createBall();
          extraBall.launched = gameState.launched;
          if (gameState.launched) {
            extraBall.x = paddle.x + paddle.width / 2;
            extraBall.y = paddle.y - extraBall.radius - 2;
          } else {
            extraBall.x = paddle.x + paddle.width / 2;
            extraBall.y = paddle.y - extraBall.radius - 2;
            extraBall.launched = false;
          }
          balls.push(extraBall);
          updateStatus("球が1個増えました");
          updateItemInventory();
          return;
        }

        if (type === "piercing") {
          if (!gameState.collectedItems.includes("piercing")) {
            gameState.collectedItems.push("piercing");
          }
          gameState.piercingActive = true;
          balls.forEach((ball) => {
            ball.pierced = true;
            ball.color = "#fb923c";
          });
          updateStatus("球が貫通モードになりました");
          updateItemInventory();
          return;
        }

        if (type === "paddleGrow") {
          if (!gameState.collectedItems.includes("paddleGrow")) {
            gameState.collectedItems.push("paddleGrow");
          }
          paddle.width = Math.min(paddle.width + 16, 120);
          updateStatus("板が少し大きくなりました");
          updateItemInventory();
          return;
        }

        if (type === "paddleShrink") {
          if (!gameState.collectedItems.includes("paddleShrink")) {
            gameState.collectedItems.push("paddleShrink");
          }
          paddle.width = Math.max(paddle.width - 16, 60);
          updateStatus("板が少し小さくなりました");
          updateItemInventory();
          return;
        }

        if (type === "life") {
          if (!gameState.collectedItems.includes("life")) {
            gameState.collectedItems.push("life");
          }
          gameState.lives += 1;
          updateHud();
          updateStatus("残機が1個増えました");
          updateItemInventory();
        }
      }

      function updateItems() {
        for (let i = items.length - 1; i >= 0; i -= 1) {
          const item = items[i];
          item.y += item.speed;

          const itemRect = {
            x: item.x - item.width / 2,
            y: item.y - item.height / 2,
            width: item.width,
            height: item.height,
          };
          const paddleRect = {
            x: paddle.x,
            y: paddle.y,
            width: paddle.width,
            height: paddle.height,
          };

          if (
            itemRect.x + itemRect.width >= paddleRect.x &&
            itemRect.x <= paddleRect.x + paddleRect.width &&
            itemRect.y + itemRect.height >= paddleRect.y &&
            itemRect.y <= paddleRect.y + paddleRect.height
          ) {
            applyItemEffect(item.type);
            items.splice(i, 1);
            continue;
          }

          if (itemRect.y - itemRect.height > canvas.height) {
            items.splice(i, 1);
          }
        }
      }

      function checkBrickCollision(ball) {
        for (const brick of bricks) {
          if (!brick.alive) continue;
          if (
            ball.x + ball.radius > brick.x &&
            ball.x - ball.radius < brick.x + brick.width &&
            ball.y + ball.radius > brick.y &&
            ball.y - ball.radius < brick.y + brick.height
          ) {
            brick.alive = false;
            gameState.score += 100;
            spawnItemFromBrick(brick);
            if (ball.pierced) {
              updateHud();
              continue;
            }
            ball.dy *= -1;
            updateHud();
            break;
          }
        }

        if (bricks.every((brick) => !brick.alive)) {
          startWinEffect();
        }
      }

      function update() {
        if (gameState.gameOver || gameState.won) {
          updateEffects();
          return;
        }

        if (keys.ArrowLeft) {
          paddle.x -= paddle.speed;
        }
        if (keys.ArrowRight) {
          paddle.x += paddle.speed;
        }
        paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, paddle.x));

        if (!gameState.launched) {
          balls.forEach((ball) => {
            ball.x = paddle.x + paddle.width / 2;
            ball.y = paddle.y - ball.radius - 2;
          });
          updateItems();
          return;
        }

        const activeBalls = [];
        balls.forEach((ball) => {
          if (!ball.launched) {
            activeBalls.push(ball);
            return;
          }

          ball.x += ball.dx;
          ball.y += ball.dy;

          if (ball.x - ball.radius <= 0 || ball.x + ball.radius >= canvas.width) {
            ball.dx *= -1;
            ball.x = Math.max(ball.radius, Math.min(canvas.width - ball.radius, ball.x));
          }

          if (ball.y - ball.radius <= 0) {
            ball.dy *= -1;
            ball.y = ball.radius;
          }

          if (
            ball.y + ball.radius >= paddle.y &&
            ball.y - ball.radius <= paddle.y + paddle.height &&
            ball.x + ball.radius >= paddle.x &&
            ball.x - ball.radius <= paddle.x + paddle.width &&
            ball.dy > 0
          ) {
            ball.dy = -Math.abs(ball.dy);
            const hitPoint = (ball.x - (paddle.x + paddle.width / 2)) / (paddle.width / 2);
            ball.dx = hitPoint * 4;
            ball.y = paddle.y - ball.radius - 1;
          }

          if (ball.y - ball.radius > canvas.height) {
            return;
          }

          activeBalls.push(ball);
          checkBrickCollision(ball);
        });

        balls.splice(0, balls.length, ...activeBalls);
        if (balls.length === 0) {
          handleLifeLost();
        }

        updateItems();
      }

      function drawBackground() {
        const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, "#0f172a");
        gradient.addColorStop(1, "#111827");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "rgba(255,255,255,0.08)";
        ctx.fillRect(0, 0, canvas.width, 36);
      }

      function drawBricks() {
        bricks.forEach((brick) => {
          if (!brick.alive) return;
          ctx.fillStyle = brick.color;
          ctx.fillRect(brick.x, brick.y, brick.width, brick.height);
          ctx.strokeStyle = "rgba(255,255,255,0.25)";
          ctx.strokeRect(brick.x, brick.y, brick.width, brick.height);
        });
      }

      function drawPaddle() {
        ctx.fillStyle = "#f8fafc";
        ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
      }

      function drawBalls() {
        balls.forEach((ball) => {
          ctx.beginPath();
          ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
          ctx.fillStyle = ball.color;
          ctx.fill();
        });
      }

      function drawItems() {
        items.forEach((item) => {
          ctx.save();
          ctx.translate(item.x, item.y);
          if (item.type === "extraBall") {
            ctx.fillStyle = "#38bdf8";
            ctx.fillRect(-10, -10, 20, 20);
            ctx.fillStyle = "#eff6ff";
            ctx.beginPath();
            ctx.arc(0, 0, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillRect(-1, -8, 2, 16);
            ctx.fillRect(-8, -1, 16, 2);
          } else if (item.type === "piercing") {
            ctx.fillStyle = "#fb923c";
            ctx.beginPath();
            ctx.moveTo(0, -10);
            ctx.lineTo(9, -1);
            ctx.lineTo(4, -1);
            ctx.lineTo(10, 10);
            ctx.lineTo(1, 1);
            ctx.lineTo(6, 1);
            ctx.closePath();
            ctx.fill();
          } else if (item.type === "paddleGrow") {
            ctx.fillStyle = "#22c55e";
            ctx.fillRect(-10, -5, 20, 10);
            ctx.fillStyle = "#f0fdf4";
            ctx.fillRect(-1, -8, 2, 16);
            ctx.fillRect(-8, -1, 16, 2);
          } else if (item.type === "paddleShrink") {
            ctx.fillStyle = "#f97316";
            ctx.fillRect(-10, -5, 20, 10);
            ctx.fillStyle = "#fff7ed";
            ctx.fillRect(-8, -1, 16, 2);
          } else {
            ctx.fillStyle = "#f43f5e";
            ctx.beginPath();
            ctx.moveTo(0, -8);
            ctx.bezierCurveTo(0, -12, 6, -12, 8, -8);
            ctx.bezierCurveTo(10, -4, 6, 2, 0, 8);
            ctx.bezierCurveTo(-6, 2, -10, -4, -8, -8);
            ctx.bezierCurveTo(-6, -12, 0, -12, 0, -8);
            ctx.fill();
          }
          ctx.restore();
        });
      }

      function drawEffectsOverlay() {
        if (gameState.won) {
          ctx.save();
          ctx.globalCompositeOperation = "screen";
          fireworks.forEach((particle) => {
            const alpha = particle.life / particle.maxLife;
            ctx.beginPath();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = particle.color;
            ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
            ctx.fill();
          });
          ctx.restore();

          ctx.save();
          ctx.font = "bold 38px sans-serif";
          ctx.textAlign = "center";
          ctx.fillStyle = "#fef3c7";
          ctx.fillText("CLEAR!", canvas.width / 2, 120);
          ctx.restore();
        }

        if (gameState.gameOver) {
          ctx.save();
          ctx.globalCompositeOperation = "screen";
          gameOverParticles.forEach((particle) => {
            const alpha = particle.life / particle.maxLife;
            ctx.beginPath();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = particle.color;
            ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
            ctx.fill();
          });
          ctx.restore();

          ctx.save();
          ctx.font = "bold 42px sans-serif";
          ctx.textAlign = "center";
          ctx.fillStyle = "#fda4af";
          ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2);
          ctx.restore();
        }
      }

      function draw() {
        drawBackground();
        drawBricks();
        drawItems();
        drawPaddle();
        drawBalls();
        drawEffectsOverlay();
      }

      function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
      }

      window.addEventListener("keydown", (event) => {
        if (event.code === "ArrowLeft" || event.code === "ArrowRight") {
          keys[event.code] = true;
          event.preventDefault();
        }
        if (event.code === "Space") {
          event.preventDefault();
          if (gameState.gameOver || gameState.won) {
            resetGame();
          } else if (!gameState.launched) {
            gameState.launched = true;
            balls.forEach((ball) => {
              if (!ball.launched) {
                ball.launched = true;
                ball.dx = (Math.random() > 0.5 ? 1 : -1) * 3;
                ball.dy = -3;
              }
            });
            updateStatus("");
          }
        }
      });

      window.addEventListener("keyup", (event) => {
        if (event.code === "ArrowLeft" || event.code === "ArrowRight") {
          keys[event.code] = false;
        }
      });

      createBricks();
      resetBalls();
      updateHud();
      loop();
    </script>
  </body>
</html>
