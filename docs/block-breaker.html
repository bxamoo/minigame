<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ブロック崩し</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-page">
      <section class="game-screen">
        <p class="eyebrow">ゲーム画面</p>
        <h1>ブロック崩し</h1>
        <p class="description">
          スペースキーで球を発射し、矢印キーで板を左右に動かして、上のブロックをすべて崩しましょう。
        </p>

        <div class="game-shell">
          <div class="hud" aria-live="polite">
            <span id="score">スコア: 0</span>
            <span id="status">スペースでスタート</span>
            <span id="lives">残機: 3</span>
          </div>
          <canvas id="gameCanvas" width="480" height="560" aria-label="ブロック崩しゲーム"></canvas>
        </div>

        <a class="secondary-button" href="index.html">トップに戻る</a>
      </section>
    </main>

    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");

      const scoreEl = document.getElementById("score");
      const statusEl = document.getElementById("status");
      const livesEl = document.getElementById("lives");

      const keys = {
        ArrowLeft: false,
        ArrowRight: false,
      };

      const gameState = {
        score: 0,
        lives: 3,
        gameOver: false,
        won: false,
        launched: false,
      };

      const paddle = {
        x: 195,
        y: 500,
        width: 90,
        height: 14,
        speed: 7,
      };

      const ball = {
        x: 240,
        y: 470,
        radius: 6,
        dx: 3,
        dy: -3,
      };

      const bricks = [];
      const brickSettings = {
        rowCount: 5,
        columnCount: 8,
        width: 48,
        height: 20,
        padding: 8,
        offsetTop: 40,
        offsetLeft: 24,
      };

      function createBricks() {
        bricks.length = 0;
        for (let row = 0; row < brickSettings.rowCount; row += 1) {
          for (let col = 0; col < brickSettings.columnCount; col += 1) {
            bricks.push({
              x: col * (brickSettings.width + brickSettings.padding) + brickSettings.offsetLeft,
              y: row * (brickSettings.height + brickSettings.padding) + brickSettings.offsetTop,
              width: brickSettings.width,
              height: brickSettings.height,
              alive: true,
              color: ["#38bdf8", "#22c55e", "#f59e0b", "#f43f5e", "#a78bfa"][row % 5],
            });
          }
        }
      }

      function resetBall() {
        ball.x = paddle.x + paddle.width / 2;
        ball.y = paddle.y - ball.radius - 2;
        ball.dx = (Math.random() > 0.5 ? 1 : -1) * 3;
        ball.dy = -3;
        gameState.launched = false;
      }

      function updateHud() {
        scoreEl.textContent = `スコア: ${gameState.score}`;
        livesEl.textContent = `残機: ${gameState.lives}`;
      }

      function updateStatus(text) {
        statusEl.textContent = text;
      }

      function resetGame() {
        gameState.score = 0;
        gameState.lives = 3;
        gameState.gameOver = false;
        gameState.won = false;
        createBricks();
        paddle.x = 195;
        resetBall();
        updateHud();
        updateStatus("スペースでスタート");
      }

      function handleLifeLost() {
        gameState.lives -= 1;
        updateHud();
        if (gameState.lives <= 0) {
          gameState.gameOver = true;
          updateStatus("ゲームオーバー。スペースで再挑戦");
        } else {
          resetBall();
          updateStatus("残機が減りました。スペースで再スタート");
        }
      }

      function checkBrickCollision() {
        for (const brick of bricks) {
          if (!brick.alive) continue;
          if (
            ball.x + ball.radius > brick.x &&
            ball.x - ball.radius < brick.x + brick.width &&
            ball.y + ball.radius > brick.y &&
            ball.y - ball.radius < brick.y + brick.height
          ) {
            brick.alive = false;
            gameState.score += 100;
            ball.dy *= -1;
            updateHud();
            break;
          }
        }

        if (bricks.every((brick) => !brick.alive)) {
          gameState.won = true;
          updateStatus("クリア！スペースでもう一度");
        }
      }

      function update() {
        if (gameState.gameOver || gameState.won) {
          return;
        }

        if (keys.ArrowLeft) {
          paddle.x -= paddle.speed;
        }
        if (keys.ArrowRight) {
          paddle.x += paddle.speed;
        }
        paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, paddle.x));

        if (!gameState.launched) {
          ball.x = paddle.x + paddle.width / 2;
          ball.y = paddle.y - ball.radius - 2;
          return;
        }

        ball.x += ball.dx;
        ball.y += ball.dy;

        if (ball.x - ball.radius <= 0 || ball.x + ball.radius >= canvas.width) {
          ball.dx *= -1;
          ball.x = Math.max(ball.radius, Math.min(canvas.width - ball.radius, ball.x));
        }

        if (ball.y - ball.radius <= 0) {
          ball.dy *= -1;
          ball.y = ball.radius;
        }

        if (
          ball.y + ball.radius >= paddle.y &&
          ball.y - ball.radius <= paddle.y + paddle.height &&
          ball.x + ball.radius >= paddle.x &&
          ball.x - ball.radius <= paddle.x + paddle.width &&
          ball.dy > 0
        ) {
          ball.dy = -Math.abs(ball.dy);
          const hitPoint = (ball.x - (paddle.x + paddle.width / 2)) / (paddle.width / 2);
          ball.dx = hitPoint * 4;
          ball.y = paddle.y - ball.radius - 1;
        }

        if (ball.y - ball.radius > canvas.height) {
          handleLifeLost();
          return;
        }

        checkBrickCollision();
      }

      function drawBackground() {
        const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, "#0f172a");
        gradient.addColorStop(1, "#111827");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "rgba(255,255,255,0.08)";
        ctx.fillRect(0, 0, canvas.width, 36);
      }

      function drawBricks() {
        bricks.forEach((brick) => {
          if (!brick.alive) return;
          ctx.fillStyle = brick.color;
          ctx.fillRect(brick.x, brick.y, brick.width, brick.height);
          ctx.strokeStyle = "rgba(255,255,255,0.25)";
          ctx.strokeRect(brick.x, brick.y, brick.width, brick.height);
        });
      }

      function drawPaddle() {
        ctx.fillStyle = "#f8fafc";
        ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
      }

      function drawBall() {
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fillStyle = "#fbbf24";
        ctx.fill();
      }

      function draw() {
        drawBackground();
        drawBricks();
        drawPaddle();
        drawBall();
      }

      function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
      }

      window.addEventListener("keydown", (event) => {
        if (event.code === "ArrowLeft" || event.code === "ArrowRight") {
          keys[event.code] = true;
          event.preventDefault();
        }
        if (event.code === "Space") {
          event.preventDefault();
          if (gameState.gameOver || gameState.won) {
            resetGame();
          } else if (!gameState.launched) {
            gameState.launched = true;
            updateStatus("");
          }
        }
      });

      window.addEventListener("keyup", (event) => {
        if (event.code === "ArrowLeft" || event.code === "ArrowRight") {
          keys[event.code] = false;
        }
      });

      createBricks();
      updateHud();
      loop();
    </script>
  </body>
</html>
