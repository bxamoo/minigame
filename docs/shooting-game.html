<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>シューティングゲーム</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-page">
      <section class="game-screen">
        <div class="game-layout">
          <div class="play-panel">
            <div class="game-shell">
              <canvas id="shootingCanvas" width="520" height="620" aria-label="シューティングゲーム"></canvas>
            </div>
          </div>

          <div class="info-panel">
            <h1>Orbital Defense</h1>
            <p class="description">
              左右に移動して、スペースキーで弾を発射します。敵機を迎撃してスコアを伸ばしましょう。
            </p>

            <div class="hud" aria-live="polite">
              <div class="hud-stat">
                <span id="score">スコア: 0</span>
              </div>
              <div class="hud-stat">
                <span id="lives">残機: 3</span>
              </div>
              <div class="hud-status" id="status">スペースで開始</div>
            </div>

            <div class="shooting-controls" aria-label="操作方法">
              <h2>操作</h2>
              <ul>
                <li>左右移動: ← → または A / D</li>
                <li>発射: Space</li>
                <li>敵機を倒すとスコアが加算されます</li>
              </ul>
            </div>

            <a class="secondary-button" href="index.html">トップに戻る</a>
          </div>
        </div>
      </section>
    </main>

    <script>
      const canvas = document.getElementById("shootingCanvas");
      const ctx = canvas.getContext("2d");
      const scoreEl = document.getElementById("score");
      const livesEl = document.getElementById("lives");
      const statusEl = document.getElementById("status");

      const keys = {
        ArrowLeft: false,
        ArrowRight: false,
        KeyA: false,
        KeyD: false,
      };

      const gameState = {
        running: false,
        gameOver: false,
        won: false,
        score: 0,
        lives: 3,
        enemyTimer: 0,
        flashTimer: 0,
        enemiesDefeated: 0,
        bossActive: false,
      };

      const player = {
        x: 0,
        y: 0,
        width: 44,
        height: 34,
        speed: 6,
        missileLevel: 0,
        piercing: false,
      };

      const bullets = [];
      const enemies = [];
      const particles = [];
      const items = [];
      const bossBullets = [];
      let boss = null;
      const stars = Array.from({ length: 80 }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: Math.random() * 1.8 + 0.4,
        alpha: Math.random() * 0.7 + 0.2,
        speed: Math.random() * 0.8 + 0.2,
      }));

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function resetPlayer() {
        player.x = canvas.width / 2 - player.width / 2;
        player.y = canvas.height - 70;
      }

      function updateHud() {
        scoreEl.textContent = `スコア: ${gameState.score}`;
        livesEl.textContent = `残機: ${gameState.lives}`;
      }

      function updateStatus(text) {
        statusEl.textContent = text;
      }

      function resetGame() {
        gameState.score = 0;
        gameState.lives = 3;
        gameState.running = false;
        gameState.gameOver = false;
        gameState.won = false;
        gameState.enemyTimer = 0;
        gameState.flashTimer = 0;
        gameState.enemiesDefeated = 0;
        gameState.bossActive = false;
        bullets.length = 0;
        enemies.length = 0;
        particles.length = 0;
        items.length = 0;
        bossBullets.length = 0;
        boss = null;
        player.missileLevel = 0;
        player.piercing = false;
        resetPlayer();
        updateHud();
        updateStatus("スペースで開始");
      }

      function startGame() {
        if (gameState.gameOver || gameState.won) {
          resetGame();
        }
        gameState.running = true;
        updateStatus("迎撃開始");
      }

      function spawnEnemy() {
        const pattern = Math.random() < 0.4 ? "swoop" : Math.random() < 0.7 ? "spiral" : "straight";
        const amplitude = 24 + Math.random() * 40;
        enemies.push({
          x: Math.random() * (canvas.width - 46),
          y: -30,
          width: 42,
          height: 28,
          speed: 1.4 + Math.random() * 1.4,
          drift: (Math.random() - 0.5) * 1.2,
          pattern,
          phase: Math.random() * Math.PI * 2,
          amplitude,
          angle: Math.random() * Math.PI * 2,
          turn: (Math.random() - 0.5) * 0.08,
          radius: 4 + Math.random() * 12,
        });
      }

      function spawnBoss() {
        boss = {
          x: canvas.width / 2 - 46,
          y: 70,
          width: 92,
          height: 58,
          vx: 2.2,
          hp: 18,
          attackTimer: 0,
        };
        gameState.bossActive = true;
        updateStatus("ボスが出現！");
      }

      function spawnBossAttack() {
        if (!boss) {
          return;
        }

        for (let i = 0; i < 5; i += 1) {
          const angle = ((i / 4) - 0.5) * 0.6;
          bossBullets.push({
            x: boss.x + boss.width / 2 - 3,
            y: boss.y + boss.height - 4,
            width: 6,
            height: 14,
            dx: Math.sin(angle) * 1.6,
            dy: 3.2 + Math.random() * 0.6,
            color: "#fb7185",
          });
        }
      }

      function spawnItem(x, y, type) {
        items.push({
          x,
          y,
          width: 18,
          height: 18,
          speed: 1.4 + Math.random() * 0.8,
          type,
        });
      }

      function fireBullet() {
        if (!gameState.running || gameState.gameOver || gameState.won) {
          return;
        }

        const shotCount = 1 + player.missileLevel;
        const spread = 0.22 + player.missileLevel * 0.08;
        for (let index = 0; index < shotCount; index += 1) {
          const offset = (index - (shotCount - 1) / 2) * spread;
          bullets.push({
            x: player.x + player.width / 2 - 2,
            y: player.y - 8,
            width: 4,
            height: 12,
            dx: Math.sin(offset) * 2.2,
            dy: -8,
            pierce: player.piercing,
            piercesLeft: player.piercing ? 2 : 1,
            color: player.piercing ? "#93c5fd" : "#fef3c7",
          });
        }
      }

      function spawnExplosion(x, y, color) {
        for (let i = 0; i < 10; i += 1) {
          particles.push({
            x,
            y,
            vx: (Math.random() - 0.5) * 3.4,
            vy: (Math.random() - 0.5) * 3.4,
            life: 18 + Math.random() * 12,
            maxLife: 30,
            color,
          });
        }
      }

      function loseLife() {
        gameState.lives -= 1;
        updateHud();
        spawnExplosion(player.x + player.width / 2, player.y + player.height / 2, "#fda4af");
        if (gameState.lives <= 0) {
          gameState.running = false;
          gameState.gameOver = true;
          updateStatus("ゲームオーバー。スペースでリセット");
        } else {
          updateStatus("被弾しました");
        }
      }

      function updatePlayer() {
        if (keys.ArrowLeft || keys.KeyA) {
          player.x -= player.speed;
        }
        if (keys.ArrowRight || keys.KeyD) {
          player.x += player.speed;
        }

        player.x = clamp(player.x, 20, canvas.width - player.width - 20);
      }

      function updateBullets() {
        for (let i = bullets.length - 1; i >= 0; i -= 1) {
          const bullet = bullets[i];
          bullet.x += bullet.dx;
          bullet.y += bullet.dy;

          if (bullet.y + bullet.height < -10 || bullet.x < -20 || bullet.x > canvas.width + 20) {
            bullets.splice(i, 1);
            continue;
          }

          let hitEnemy = false;
          if (boss && gameState.bossActive) {
            if (
              bullet.x + bullet.width > boss.x &&
              bullet.x < boss.x + boss.width &&
              bullet.y + bullet.height > boss.y &&
              bullet.y < boss.y + boss.height
            ) {
              boss.hp -= 1;
              spawnExplosion(bullet.x, bullet.y, "#fbbf24");
              if (!bullet.pierce) {
                bullets.splice(i, 1);
              } else {
                bullet.piercesLeft -= 1;
                if (bullet.piercesLeft <= 0) {
                  bullets.splice(i, 1);
                }
              }
              if (boss.hp <= 0) {
                gameState.score += 2000;
                updateHud();
                spawnExplosion(boss.x + boss.width / 2, boss.y + boss.height / 2, "#fef3c7");
                boss = null;
                gameState.bossActive = false;
                gameState.running = false;
                gameState.won = true;
                updateStatus("ボスを撃破！ゲームクリア");
              }
              continue;
            }
          }

          for (let j = enemies.length - 1; j >= 0; j -= 1) {
            const enemy = enemies[j];
            if (
              bullet.x + bullet.width > enemy.x &&
              bullet.x < enemy.x + enemy.width &&
              bullet.y + bullet.height > enemy.y &&
              bullet.y < enemy.y + enemy.height
            ) {
              enemies.splice(j, 1);
              gameState.score += 100;
              gameState.enemiesDefeated += 1;
              updateHud();
              spawnExplosion(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2, "#fbbf24");
              if (Math.random() < 0.18) {
                const itemType = Math.random() < 0.5 ? "spread" : "pierce";
                spawnItem(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2, itemType);
              }
              if (!bullet.pierce) {
                bullets.splice(i, 1);
              } else {
                bullet.piercesLeft -= 1;
                if (bullet.piercesLeft <= 0) {
                  bullets.splice(i, 1);
                }
              }
              hitEnemy = true;
              break;
            }
          }

          if (hitEnemy) {
            continue;
          }
        }
      }

      function updateItems() {
        for (let i = items.length - 1; i >= 0; i -= 1) {
          const item = items[i];
          item.y += item.speed;

          if (item.y > canvas.height + 20) {
            items.splice(i, 1);
            continue;
          }

          if (
            item.x + item.width > player.x &&
            item.x < player.x + player.width &&
            item.y + item.height > player.y &&
            item.y < player.y + player.height
          ) {
            if (item.type === "spread") {
              player.missileLevel += 1;
              updateStatus("ミサイルが増えました");
            } else {
              player.piercing = true;
              updateStatus("貫通ミサイルになりました");
            }
            items.splice(i, 1);
          }
        }
      }

      function updateEnemies() {
        if (!gameState.bossActive && gameState.enemiesDefeated >= 12) {
          spawnBoss();
          return;
        }

        gameState.enemyTimer += 1;
        if (!gameState.bossActive && gameState.enemyTimer % 44 === 0) {
          spawnEnemy();
        }

        for (let i = enemies.length - 1; i >= 0; i -= 1) {
          const enemy = enemies[i];

          if (enemy.pattern === "straight") {
            enemy.x += enemy.drift;
            enemy.y += enemy.speed;
          } else if (enemy.pattern === "swoop") {
            enemy.x += Math.sin((gameState.enemyTimer + enemy.phase) / 28) * enemy.amplitude + enemy.drift;
            enemy.y += enemy.speed;
          } else {
            enemy.angle += enemy.turn;
            enemy.x += Math.sin(enemy.angle) * enemy.radius + enemy.drift;
            enemy.y += enemy.speed * 0.7;
          }

          enemy.drift *= 0.994;
          if (enemy.x < -30 || enemy.x > canvas.width + 30) {
            enemy.drift *= -1;
            enemy.x = clamp(enemy.x, -20, canvas.width + 20);
          }

          if (
            enemy.x + enemy.width > player.x &&
            enemy.x < player.x + player.width &&
            enemy.y + enemy.height > player.y &&
            enemy.y < player.y + player.height
          ) {
            enemies.splice(i, 1);
            loseLife();
            continue;
          }

          if (enemy.y > canvas.height + 40) {
            enemies.splice(i, 1);
          }
        }
      }

      function updateBoss() {
        if (!boss) {
          return;
        }

        boss.x += boss.vx;
        if (boss.x <= 36 || boss.x >= canvas.width - boss.width - 36) {
          boss.vx *= -1;
        }

        boss.attackTimer += 1;
        if (boss.attackTimer >= 90) {
          boss.attackTimer = 0;
          spawnBossAttack();
        }
      }

      function updateBossBullets() {
        for (let i = bossBullets.length - 1; i >= 0; i -= 1) {
          const bullet = bossBullets[i];
          bullet.x += bullet.dx;
          bullet.y += bullet.dy;

          if (bullet.y > canvas.height + 20 || bullet.x < -20 || bullet.x > canvas.width + 20) {
            bossBullets.splice(i, 1);
            continue;
          }

          if (
            bullet.x + bullet.width > player.x &&
            bullet.x < player.x + player.width &&
            bullet.y + bullet.height > player.y &&
            bullet.y < player.y + player.height
          ) {
            bossBullets.splice(i, 1);
            loseLife();
          }
        }
      }

      function updateParticles() {
        for (let i = particles.length - 1; i >= 0; i -= 1) {
          const particle = particles[i];
          particle.x += particle.vx;
          particle.y += particle.vy;
          particle.vy += 0.02;
          particle.life -= 1;
          if (particle.life <= 0) {
            particles.splice(i, 1);
          }
        }
      }

      function updateStars() {
        stars.forEach((star) => {
          star.y += star.speed;
          if (star.y > canvas.height + 2) {
            star.y = -2;
            star.x = Math.random() * canvas.width;
          }
        });
      }

      function update() {
        if (!gameState.running || gameState.gameOver || gameState.won) {
          updateParticles();
          updateStars();
          return;
        }

        updatePlayer();
        updateBullets();
        updateItems();
        updateEnemies();
        updateBoss();
        updateBossBullets();
        updateParticles();
        updateStars();
      }

      function drawBackground() {
        const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, "#020617");
        gradient.addColorStop(1, "#111827");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        stars.forEach((star) => {
          ctx.beginPath();
          ctx.fillStyle = `rgba(255,255,255,${star.alpha})`;
          ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
          ctx.fill();
        });
      }

      function drawPlayer() {
        ctx.save();
        ctx.translate(player.x + player.width / 2, player.y + player.height / 2);
        ctx.fillStyle = "#f8fafc";
        ctx.beginPath();
        ctx.moveTo(0, -18);
        ctx.lineTo(18, 10);
        ctx.lineTo(10, 8);
        ctx.lineTo(0, 16);
        ctx.lineTo(-10, 8);
        ctx.lineTo(-18, 10);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "#38bdf8";
        ctx.fillRect(-8, -2, 16, 10);
        ctx.fillStyle = "#0f172a";
        ctx.fillRect(-4, 2, 8, 8);
        ctx.fillStyle = "#fbbf24";
        ctx.fillRect(-2, 12, 4, 6);
        ctx.restore();
      }

      function drawEnemy(enemy) {
        ctx.save();
        ctx.translate(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2);
        ctx.fillStyle = "#fb923c";
        ctx.beginPath();
        ctx.moveTo(0, 14);
        ctx.lineTo(16, -10);
        ctx.lineTo(8, -8);
        ctx.lineTo(0, -14);
        ctx.lineTo(-8, -8);
        ctx.lineTo(-16, -10);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "#f43f5e";
        ctx.fillRect(-7, -2, 14, 10);
        ctx.fillStyle = "#0f172a";
        ctx.fillRect(-3, 0, 6, 8);
        ctx.restore();
      }

      function drawBoss() {
        if (!boss) {
          return;
        }

        ctx.save();
        ctx.translate(boss.x + boss.width / 2, boss.y + boss.height / 2);
        ctx.fillStyle = "#f43f5e";
        ctx.beginPath();
        ctx.moveTo(-44, 0);
        ctx.lineTo(-28, -18);
        ctx.lineTo(-10, -18);
        ctx.lineTo(0, -28);
        ctx.lineTo(10, -18);
        ctx.lineTo(28, -18);
        ctx.lineTo(44, 0);
        ctx.lineTo(28, 18);
        ctx.lineTo(10, 18);
        ctx.lineTo(0, 28);
        ctx.lineTo(-10, 18);
        ctx.lineTo(-28, 18);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "#fda4af";
        ctx.fillRect(-22, -8, 44, 16);
        ctx.fillStyle = "#0f172a";
        ctx.fillRect(-10, -4, 20, 8);
        ctx.restore();
      }

      function drawBullets() {
        bullets.forEach((bullet) => {
          ctx.fillStyle = bullet.color;
          ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
        });
      }

      function drawBossBullets() {
        bossBullets.forEach((bullet) => {
          ctx.fillStyle = bullet.color;
          ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
        });
      }

      function drawItems() {
        items.forEach((item) => {
          ctx.save();
          ctx.translate(item.x, item.y);
          if (item.type === "spread") {
            ctx.fillStyle = "#f59e0b";
            ctx.fillRect(-9, -9, 18, 18);
            ctx.fillStyle = "#fff7ed";
            ctx.beginPath();
            ctx.arc(0, 0, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillRect(-1, -7, 2, 14);
            ctx.fillRect(-7, -1, 14, 2);
          } else {
            ctx.fillStyle = "#38bdf8";
            ctx.fillRect(-9, -9, 18, 18);
            ctx.fillStyle = "#eff6ff";
            ctx.beginPath();
            ctx.moveTo(0, -6);
            ctx.lineTo(6, 0);
            ctx.lineTo(0, 6);
            ctx.lineTo(-6, 0);
            ctx.closePath();
            ctx.fill();
          }
          ctx.restore();
        });
      }

      function drawParticles() {
        particles.forEach((particle) => {
          const alpha = particle.life / particle.maxLife;
          ctx.globalAlpha = alpha;
          ctx.fillStyle = particle.color;
          ctx.fillRect(particle.x, particle.y, 2, 2);
        });
        ctx.globalAlpha = 1;
      }

      function drawStatusOverlay() {
        if (!gameState.running && !gameState.gameOver && !gameState.won) {
          ctx.save();
          ctx.font = "bold 26px sans-serif";
          ctx.textAlign = "center";
          ctx.fillStyle = "rgba(248, 250, 252, 0.9)";
          ctx.fillText("PRESS SPACE TO START", canvas.width / 2, canvas.height / 2 + 20);
          ctx.restore();
        }

        if (gameState.gameOver) {
          ctx.save();
          ctx.font = "bold 34px sans-serif";
          ctx.textAlign = "center";
          ctx.fillStyle = "#fda4af";
          ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 10);
          ctx.restore();
        }

        if (gameState.won) {
          ctx.save();
          ctx.font = "bold 34px sans-serif";
          ctx.textAlign = "center";
          ctx.fillStyle = "#fef3c7";
          ctx.fillText("CLEAR!", canvas.width / 2, canvas.height / 2 - 10);
          ctx.restore();
        }
      }

      function draw() {
        drawBackground();
        drawItems();
        drawBossBullets();
        enemies.forEach(drawEnemy);
        drawBullets();
        drawBoss();
        drawParticles();
        drawPlayer();
        drawStatusOverlay();
      }

      function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
      }

      function handleKeyDown(event) {
        if (event.code === "ArrowLeft" || event.code === "KeyA") {
          keys.ArrowLeft = true;
          keys.KeyA = true;
          event.preventDefault();
        } else if (event.code === "ArrowRight" || event.code === "KeyD") {
          keys.ArrowRight = true;
          keys.KeyD = true;
          event.preventDefault();
        } else if (event.code === "Space") {
          event.preventDefault();
          if (!gameState.running) {
            if (gameState.gameOver || gameState.won) {
              resetGame();
            }
            startGame();
          } else if (!gameState.gameOver && !gameState.won) {
            fireBullet();
          } else {
            resetGame();
            startGame();
          }
        }
      }

      function handleKeyUp(event) {
        if (event.code === "ArrowLeft" || event.code === "KeyA") {
          keys.ArrowLeft = false;
          keys.KeyA = false;
        } else if (event.code === "ArrowRight" || event.code === "KeyD") {
          keys.ArrowRight = false;
          keys.KeyD = false;
        }
      }

      window.addEventListener("keydown", handleKeyDown);
      window.addEventListener("keyup", handleKeyUp);
      window.addEventListener("blur", () => {
        keys.ArrowLeft = false;
        keys.ArrowRight = false;
        keys.KeyA = false;
        keys.KeyD = false;
      });

      resetGame();
      loop();
    </script>
  </body>
</html>
