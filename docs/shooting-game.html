<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>シューティングゲーム</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-page">
      <section class="game-screen">
        <div class="game-layout">
          <div class="play-panel">
            <div class="game-shell">
              <canvas id="shootingCanvas" width="520" height="620" aria-label="シューティングゲーム"></canvas>
            </div>
          </div>

          <div class="info-panel">
            <h1>Orbital Defense</h1>
            <p class="description">
              左右に移動して、スペースキーで弾を発射します。敵機を迎撃してスコアを伸ばしましょう。
            </p>

            <div class="hud" aria-live="polite">
              <div class="hud-stat">
                <span id="score">スコア: 0</span>
              </div>
              <div class="hud-stat">
                <span id="lives">残機: 3</span>
              </div>
              <div class="hud-status" id="status">スペースで開始</div>
            </div>

            <div class="shooting-controls" aria-label="操作方法">
              <h2>操作</h2>
              <ul>
                <li>左右移動: ← → または A / D</li>
                <li>発射: Space</li>
                <li>敵機を倒すとスコアが加算されます</li>
              </ul>
            </div>

            <a class="secondary-button" href="index.html">トップに戻る</a>
          </div>
        </div>
      </section>
    </main>

    <script>
      const canvas = document.getElementById("shootingCanvas");
      const ctx = canvas.getContext("2d");
      const scoreEl = document.getElementById("score");
      const livesEl = document.getElementById("lives");
      const statusEl = document.getElementById("status");

      const keys = {
        ArrowLeft: false,
        ArrowRight: false,
        KeyA: false,
        KeyD: false,
      };

      const gameState = {
        running: false,
        gameOver: false,
        won: false,
        score: 0,
        lives: 10,
        enemyTimer: 0,
        flashTimer: 0,
        enemiesDefeated: 0,
        stage: 0,
        bossActive: false,
        inputLocked: false,
        clearAnimationTimer: 0,
      };

      const player = {
        x: 0,
        y: 0,
        width: 44,
        height: 34,
        speed: 6,
        missileLevel: 0,
        piercing: false,
        attackPower: 1,
        invincible: 0,
      };

      const bullets = [];
      const enemies = [];
      const particles = [];
      const items = [];
      const bossBullets = [];
      let boss = null;
      const stars = Array.from({ length: 80 }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: Math.random() * 1.8 + 0.4,
        alpha: Math.random() * 0.7 + 0.2,
        speed: Math.random() * 0.8 + 0.2,
      }));

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function resetPlayer() {
        player.x = canvas.width / 2 - player.width / 2;
        player.y = canvas.height - 70;
      }

      function updateHud() {
        scoreEl.textContent = `スコア: ${gameState.score}`;
        livesEl.textContent = `残機: ${gameState.lives}`;
      }

      function updateStatus(text) {
        statusEl.textContent = text;
      }

      function resetGame() {
        gameState.score = 0;
        gameState.lives = 10;
        gameState.running = false;
        gameState.gameOver = false;
        gameState.won = false;
        gameState.enemyTimer = 0;
        gameState.flashTimer = 0;
        gameState.enemiesDefeated = 0;
        gameState.stage = 0;
        gameState.bossActive = false;
        gameState.inputLocked = false;
        gameState.clearAnimationTimer = 0;
        bullets.length = 0;
        enemies.length = 0;
        particles.length = 0;
        items.length = 0;
        bossBullets.length = 0;
        boss = null;
        player.missileLevel = 0;
        player.piercing = false;
        player.attackPower = 1;
        player.invincible = 0;
        spaceHeld = false;
        resetPlayer();
        updateHud();
        updateStatus("スペースで開始");
      }

      function startGame() {
        if (gameState.gameOver || gameState.won) {
          resetGame();
        }
        gameState.running = true;
        updateStatus("迎撃開始");
      }

      function spawnEnemy() {

        // 出現する動きをランダムに決める
        const patterns = [
          "straight",
          "zigzag",
          "curve",
          "slowSine",
          "fastSine"
        ];

        const r = Math.random();
        let pattern;

        if (r < 0.10) {
            pattern = "straight";
        }
        else if (r < 0.40) {
            pattern = "zigzag";
        }
        else if (r < 0.60) {
            pattern = "curve";
        }
        else if (r < 0.80) {
            pattern = "slowSine";
        }
        else {
            pattern = "fastSine";
        }
        enemies.push({
          x: Math.random() * (canvas.width - 46),
          y: -30,
          width: 42,
          height: 28,
          hp: 3,
          maxHp: 3,
          speed: 1.8 + Math.random(),
          pattern,
          phase: Math.random() * Math.PI * 2,
          amplitude: 20 + Math.random() * 40,
          drift: (Math.random() - 0.5) * 2,
          angle: 0,
        });
      }

function spawnBoss(type) {

    if (type === "middle") {

        boss = {
            x: canvas.width / 2 - 45,
            y: 70,
            width: 90,
            height: 60,
            vx: 2,
            hp: 20,
            maxHp: 20,
            attackTimer: 0,
            type: "middle",
        };

        updateStatus("中ボス出現！");

    } else {

        boss = {
            x: canvas.width / 2 - 54,
            y: 70,
            width: 130,
            height: 90,
            vx: 1.4,
            hp: 72,
            maxHp: 72,
            attackTimer: 0,
            type: "last",
        };

        updateStatus("ラスボス出現！");
    }

    gameState.bossActive = true;
}

      function spawnBossAttack() {
        if (!boss) {
          return;
        }

        for (let i = 0; i < 7; i += 1) {
          const angle = ((i / 6) - 0.5) * 1.1;
          bossBullets.push({
            x: boss.x + boss.width / 2 - 3,
            y: boss.y + boss.height - 4,
            width: 6,
            height: 14,
            dx: Math.sin(angle) * 2.2,
            dy: 3.4 + Math.random() * 0.8,
            color: "#fb7185",
          });
        }
      }

      function spawnItem(x, y, type) {
        items.push({
          x,
          y,
          width: 18,
          height: 18,
          speed: 1.4 + Math.random() * 0.8,
          type,
        });
      }

      function fireBullet() {
        if (!gameState.running || gameState.gameOver || gameState.won) {
          return;
        }

        const shotCount = 1 + player.missileLevel;
        const spread = 0.22 + player.missileLevel * 0.08;
        for (let index = 0; index < shotCount; index += 1) {
          const offset = (index - (shotCount - 1) / 2) * spread;
          bullets.push({
            x: player.x + player.width / 2 - 2,
            y: player.y - 8,
            width: 4,
            height: 12,
            dx: Math.sin(offset) * 2.2,
            dy: -8,
            damage: player.attackPower,
            pierce: player.piercing,
            piercesLeft: player.piercing ? 2 : 1,
            color: player.piercing ? "#93c5fd" : "#fef3c7",
          });
        }
      }

      function spawnExplosion(x, y, color) {
        for (let i = 0; i < 10; i += 1) {
          particles.push({
            x,
            y,
            vx: (Math.random() - 0.5) * 3.4,
            vy: (Math.random() - 0.5) * 3.4,
            life: 18 + Math.random() * 12,
            maxLife: 30,
            color,
          });
        }
      }

      function loseLife() {
        if (player.invincible > 0) return;
        gameState.lives -= 1;
        player.invincible = 120;
        updateHud();
        spawnExplosion(player.x + player.width / 2, player.y + player.height / 2, "#fda4af");
        if (gameState.lives <= 0) {
          gameState.running = false;
          gameState.gameOver = true;
          gameState.clearAnimationTimer = 0;
          gameState.inputLocked = true;
          gameState.clearAnimationTimer = 0;
          updateStatus("ゲームオーバー。スペースでリセット");
        } else {
          updateStatus("被弾しました");
        }
      }

      function updatePlayer() {
        if (keys.ArrowLeft || keys.KeyA) {
          player.x -= player.speed;
        }
        if (keys.ArrowRight || keys.KeyD) {
          player.x += player.speed;
        }

        player.x = clamp(player.x, 0, canvas.width - player.width);
      }

      function updateBullets() {
        for (let i = bullets.length - 1; i >= 0; i--) {
          const bullet = bullets[i];

          bullet.x += bullet.dx;
          bullet.y += bullet.dy;

          if (
            bullet.y + bullet.height < -10 ||
            bullet.x < -20 ||
            bullet.x > canvas.width + 20
          ) {
            bullets.splice(i, 1);
            continue;
          }

          // ボス判定
          if (boss && gameState.bossActive) {
            if (
              bullet.x + bullet.width > boss.x &&
              bullet.x < boss.x + boss.width &&
              bullet.y + bullet.height > boss.y &&
              bullet.y < boss.y + boss.height
            ) {
              boss.hp -= bullet.damage;
              spawnExplosion(bullet.x, bullet.y, "#fbbf24");

              if (!bullet.pierce) {
                bullets.splice(i, 1);
              } else {
                bullet.piercesLeft--;
                if (bullet.piercesLeft <= 0) {
                  bullets.splice(i, 1);
                }
              }

if (boss.hp <= 0) {

    gameState.score += 2000;
    updateHud();

    bossBullets.length = 0;

    // ===== 中ボス撃破 =====
    if (boss.type === "middle") {

        boss = null;
        gameState.bossActive = false;

        gameState.stage = 2;

        updateStatus("中ボス撃破！");

    }

    // ===== ラスボス撃破 =====
    else {

        boss = null;
        gameState.bossActive = false;

        gameState.running = false;
        gameState.won = true;
        gameState.inputLocked = true;
        gameState.clearAnimationTimer = 0;

        updateStatus("ラスボス撃破！");
    }

    continue;
}

              continue;
            }
          }

          // 通常敵判定
          let hitEnemy = false;

          for (let j = enemies.length - 1; j >= 0; j--) {
            const enemy = enemies[j];

            if (
              bullet.x + bullet.width > enemy.x &&
              bullet.x < enemy.x + enemy.width &&
              bullet.y + bullet.height > enemy.y &&
              bullet.y < enemy.y + enemy.height
            ) {
              enemy.hp -= bullet.damage;

              spawnExplosion(bullet.x, bullet.y, "#fef08a");

              if (enemy.hp <= 0) {
                enemies.splice(j, 1);

                gameState.score += 100;
                gameState.enemiesDefeated++;

                updateHud();

                spawnExplosion(
                  enemy.x + enemy.width / 2,
                  enemy.y + enemy.height / 2,
                  "#fbbf24"
                );

                if (Math.random() < 0.18) {
                  const types = ["spread", "pierce", "life", "power"];
                  spawnItem(
                    enemy.x + enemy.width / 2,
                    enemy.y + enemy.height / 2,
                    types[Math.floor(Math.random() * types.length)]
                  );
                }
              }

              if (!bullet.pierce) {
                bullets.splice(i, 1);
              } else {
                bullet.piercesLeft--;

                if (bullet.piercesLeft <= 0) {
                  bullets.splice(i, 1);
                }
              }

              hitEnemy = true;
              break;
            }
          }

          if (hitEnemy) {
            continue;
          }
        }
      }
      function updateItems() {
        for (let i = items.length - 1; i >= 0; i -= 1) {
          const item = items[i];
          item.y += item.speed;

          if (item.y > canvas.height + 20) {
            items.splice(i, 1);
            continue;
          }

          if (
            item.x + item.width > player.x &&
            item.x < player.x + player.width &&
            item.y + item.height > player.y &&
            item.y < player.y + player.height
          ) {
            if(item.type==="spread"){
              player.missileLevel++;
              updateStatus("ミサイル増加");
            }
            else if(item.type==="pierce"){
              player.piercing=true;
              updateStatus("貫通弾");
            }
            else if(item.type==="life"){
              gameState.lives++;
              updateHud();
              updateStatus("残機アップ！");
            }
            else if(item.type==="power"){
                player.attackPower++;
                updateStatus(
                  "攻撃力アップ！ Lv." + player.attackPower
                );
            }
            items.splice(i, 1);
          }
        }
      }

      function updateEnemies() {
if (
    gameState.stage === 0 &&
    !gameState.bossActive &&
    gameState.enemiesDefeated >= 10
) {
    gameState.stage = 1;
    spawnBoss("middle");
    return;
}
if (
    gameState.stage === 2 &&
    !gameState.bossActive
) {
    gameState.stage = 3;
    spawnBoss("last");
    return;
}
        gameState.enemyTimer += 1;
        if (!gameState.bossActive && gameState.enemyTimer % 70 === 0) {
          spawnEnemy();
        }

        for (let i = enemies.length - 1; i >= 0; i -= 1) {
          const enemy = enemies[i];
          // 真っすぐ
          if (enemy.pattern === "straight") {
              enemy.y += enemy.speed;
          }
          // ジグザグ
          else if (enemy.pattern === "zigzag") {
              enemy.y += enemy.speed;
              enemy.x += Math.sin(enemy.y / 20) * 3;
          }
          // ゆるいカーブ
          else if (enemy.pattern === "curve") {
              enemy.y += enemy.speed;
              enemy.x += enemy.drift;
          }
          // ゆっくり波
          else if (enemy.pattern === "slowSine") {
              enemy.y += enemy.speed;
              enemy.x += Math.sin(enemy.y / 50 + enemy.phase) * 2;
          }
          // 大きく波
          else if (enemy.pattern === "fastSine") {
              enemy.y += enemy.speed;
              enemy.x += Math.sin(enemy.y / 18 + enemy.phase) * 4;
          }

          if (
            enemy.x + enemy.width > player.x &&
            enemy.x < player.x + player.width &&
            enemy.y + enemy.height > player.y &&
            enemy.y < player.y + player.height
          ) {
            enemies.splice(i, 1);
            loseLife();
            continue;
          }

          if (enemy.y > canvas.height + 40) {
            enemies.splice(i, 1);
          }
        }
      }

      function updateBoss() {
        if (!boss) {
          return;
        }

        boss.x += boss.vx;
        if (boss.x <= 36 || boss.x >= canvas.width - boss.width - 36) {
          boss.vx *= -1;
        }

        boss.attackTimer += 1;
        if (boss.attackTimer >= 90) {
          boss.attackTimer = 0;
          spawnBossAttack();
        }
      }

      function updateBossBullets() {
        for (let i = bossBullets.length - 1; i >= 0; i -= 1) {
          const bullet = bossBullets[i];
          let destroyed = false;
          bullet.x += bullet.dx;
          bullet.y += bullet.dy;
          // プレイヤーの弾との当たり判定
          for (let j = bullets.length - 1; j >= 0; j--) {
            const playerBullet = bullets[j];

            if (
                playerBullet.x + playerBullet.width > bullet.x &&
                playerBullet.x < bullet.x + bullet.width &&
                playerBullet.y + playerBullet.height > bullet.y &&
                playerBullet.y < bullet.y + bullet.height
            ) {

                spawnExplosion(bullet.x, bullet.y, "#93c5fd");

                bossBullets.splice(i, 1);
                destroyed = true;

                if (!playerBullet.pierce) {
                    bullets.splice(j, 1);
                }

                break;
            }
          }
          if (destroyed) {
              continue;
          }
          if (bullet.y > canvas.height + 20 || bullet.x < -20 || bullet.x > canvas.width + 20) {
            bossBullets.splice(i, 1);
            continue;
          }

          if (
            bullet.x + bullet.width > player.x &&
            bullet.x < player.x + player.width &&
            bullet.y + bullet.height > player.y &&
            bullet.y < player.y + player.height
          ) {
            bossBullets.splice(i, 1);
            loseLife();
          }
        }
      }

      function updateParticles() {
        for (let i = particles.length - 1; i >= 0; i -= 1) {
          const particle = particles[i];
          particle.x += particle.vx;
          particle.y += particle.vy;
          particle.vy += 0.02;
          particle.life -= 1;
          if (particle.life <= 0) {
            particles.splice(i, 1);
          }
        }
      }

      function updateStars() {
        stars.forEach((star) => {
          star.y += star.speed;
          if (star.y > canvas.height + 2) {
            star.y = -2;
            star.x = Math.random() * canvas.width;
          }
        });
      }

      function update() {
        if (gameState.gameOver || gameState.won) {

            gameState.clearAnimationTimer++;

            if (
                gameState.inputLocked &&
                gameState.clearAnimationTimer >= 180
            ) {
                gameState.inputLocked = false;
            }

            // クリア時だけ花火
            if (
                gameState.won &&
                gameState.clearAnimationTimer % 2 === 0
            ) {
                for (let i = 0; i < 6; i++) {
                    const angle = Math.PI * 2 * i / 6;

                    particles.push({
                        x: canvas.width / 2,
                        y: canvas.height / 2 - 20,
                        vx: Math.cos(angle) * (1.2 + Math.random() * 2.2),
                        vy: Math.sin(angle) * (1.2 + Math.random() * 2.2),
                        life: 20 + Math.random() * 16,
                        maxLife: 36,
                        color: ["#fef3c7","#fda4af","#93c5fd","#86efac"][Math.floor(Math.random()*4)]
                    });
                }
            }

            updateParticles();
            updateStars();
            return;
        }

        if (!gameState.running || gameState.gameOver) {
          updateParticles();
          updateStars();
          return;
        }

        updatePlayer();
        if (player.invincible > 0) {
            player.invincible--;
        }
        updateBullets();
        updateItems();
        updateEnemies();
        updateBoss();
        updateBossBullets();
        updateParticles();
        updateStars();
      }

      function drawBackground() {
        const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, "#020617");
        gradient.addColorStop(1, "#111827");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        stars.forEach((star) => {
          ctx.beginPath();
          ctx.fillStyle = `rgba(255,255,255,${star.alpha})`;
          ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
          ctx.fill();
        });
      }

      function drawPlayer() {
        if (
            player.invincible > 0 &&
            Math.floor(player.invincible / 5) % 2 === 0
        ) {
            return;
        }
        ctx.save();
        ctx.translate(player.x + player.width / 2, player.y + player.height / 2);
        ctx.fillStyle = "#f8fafc";
        ctx.beginPath();
        ctx.moveTo(0, -18);
        ctx.lineTo(18, 10);
        ctx.lineTo(10, 8);
        ctx.lineTo(0, 16);
        ctx.lineTo(-10, 8);
        ctx.lineTo(-18, 10);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "#38bdf8";
        ctx.fillRect(-8, -2, 16, 10);
        ctx.fillStyle = "#0f172a";
        ctx.fillRect(-4, 2, 8, 8);
        ctx.fillStyle = "#fbbf24";
        ctx.fillRect(-2, 12, 4, 6);
        ctx.restore();
      }

      function drawEnemy(enemy) {
        ctx.save();
        ctx.translate(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2);
        ctx.fillStyle = "#fb923c";
        ctx.beginPath();
        ctx.moveTo(0, 14);
        ctx.lineTo(16, -10);
        ctx.lineTo(8, -8);
        ctx.lineTo(0, -14);
        ctx.lineTo(-8, -8);
        ctx.lineTo(-16, -10);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "#f43f5e";
        ctx.fillRect(-7, -2, 14, 10);
        ctx.fillStyle = "#0f172a";
        ctx.fillRect(-3, 0, 6, 8);
        // ===== HPゲージ =====
        // 枠
        ctx.fillStyle = "#444";
        ctx.fillRect(-16, -22, 32, 4);
        // HP
        ctx.fillStyle = "#22c55e";
        ctx.fillRect(
            -16,
            -22,
            32 * (enemy.hp / enemy.maxHp),
            4
        );
        ctx.restore();
      }

      function drawBoss() {
        if (!boss) {
          return;
        }

        ctx.save();
        ctx.translate(boss.x + boss.width / 2, boss.y + boss.height / 2);

        // ===== 本体（黒）=====
        ctx.fillStyle = "#2b1b1b";
        ctx.beginPath();
        ctx.moveTo(0, 42);      // 先端（下）
        ctx.lineTo(48, -30);    // 右上
        ctx.lineTo(18, -18);
        ctx.lineTo(0, -42);     // 上
        ctx.lineTo(-18, -18);
        ctx.lineTo(-48, -30);   // 左上
        ctx.closePath();
        ctx.fill();

        // ===== 中央（赤）=====
        ctx.fillStyle = "#8b0000";
        ctx.beginPath();
        ctx.moveTo(0, 28);
        ctx.lineTo(24, -18);
        ctx.lineTo(0, -28);
        ctx.lineTo(-24, -18);
        ctx.closePath();
        ctx.fill();

        // ===== コックピット =====
        ctx.fillStyle = "#ffb347";
        ctx.beginPath();
        ctx.arc(0, -8, 8, 0, Math.PI * 2);
        ctx.fill();

        // ===== 左翼 =====
        ctx.fillStyle = "#5c4033";
        ctx.beginPath();
        ctx.moveTo(-18, -8);
        ctx.lineTo(-58, 12);
        ctx.lineTo(-28, 8);
        ctx.closePath();
        ctx.fill();

        // ===== 右翼 =====
        ctx.beginPath();
        ctx.moveTo(18, -8);
        ctx.lineTo(58, 12);
        ctx.lineTo(28, 8);
        ctx.closePath();
        ctx.fill();

        // ===== エンジン =====
        ctx.fillStyle = "#ff4500";
        ctx.fillRect(-16, 30, 10, 12);
        ctx.fillRect(6, 30, 10, 12);

        ctx.restore();

        // ===== HPバー =====
        ctx.fillStyle = "#444";
        ctx.fillRect(boss.x, boss.y - 16, boss.width, 8);

        ctx.fillStyle = "#22c55e";
        ctx.fillRect(
          boss.x,
          boss.y - 16,
          boss.width * (boss.hp / boss.maxHp),
          8
        );
      }

      function drawBullets() {
        bullets.forEach((bullet) => {
          ctx.fillStyle = bullet.color;
          ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
        });
      }

      function drawBossBullets() {
        bossBullets.forEach((bullet) => {
          ctx.fillStyle = bullet.color;
          ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
        });
      }

      function drawItems() {
        items.forEach((item) => {
          ctx.save();
          ctx.translate(item.x, item.y);
          if (item.type === "spread") {
            ctx.fillStyle = "#f59e0b";
            ctx.fillRect(-9, -9, 18, 18);
            ctx.fillStyle = "#fff7ed";
            ctx.beginPath();
            ctx.arc(0, 0, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillRect(-1, -7, 2, 14);
            ctx.fillRect(-7, -1, 14, 2);
          } 
          else if (item.type==="pierce") {
            ctx.fillStyle = "#38bdf8";
            ctx.fillRect(-9, -9, 18, 18);
            ctx.fillStyle = "#eff6ff";
            ctx.beginPath();
            ctx.moveTo(0, -6);
            ctx.lineTo(6, 0);
            ctx.lineTo(0, 6);
            ctx.lineTo(-6, 0);
            ctx.closePath();
            ctx.fill();
          }
          else if(item.type==="life"){
            // ハート
            ctx.fillStyle = "red";
            ctx.beginPath();
            ctx.moveTo(0,8);
            ctx.bezierCurveTo(-10,0,-8,-10,-4,-4);
            ctx.arc(-4,-4,4,Math.PI,0);
            ctx.arc(4,-4,4,Math.PI,0);
            ctx.bezierCurveTo(8,-10,10,0,0,8);
            ctx.fill();
          }
          else if(item.type==="power"){
            // 黄色い星
            ctx.fillStyle="yellow";
            ctx.beginPath();
            ctx.moveTo(0,-8);
            ctx.lineTo(3,-2);
            ctx.lineTo(8,-2);
            ctx.lineTo(4,2);
            ctx.lineTo(6,8);
            ctx.lineTo(0,4);
            ctx.lineTo(-6,8);
            ctx.lineTo(-4,2);
            ctx.lineTo(-8,-2);
            ctx.lineTo(-3,-2);
            ctx.closePath();
            ctx.fill();
          }
          ctx.restore();
        });
      }

      function drawParticles() {
        particles.forEach((particle) => {
          const alpha = particle.life / particle.maxLife;
          ctx.globalAlpha = alpha;
          ctx.fillStyle = particle.color;
          ctx.fillRect(particle.x, particle.y, 2, 2);
        });
        ctx.globalAlpha = 1;
      }

      function drawStatusOverlay() {
        if (!gameState.running && !gameState.gameOver && !gameState.won) {
          ctx.save();
          ctx.font = "bold 26px sans-serif";
          ctx.textAlign = "center";
          ctx.fillStyle = "rgba(248, 250, 252, 0.9)";
          ctx.fillText("PRESS SPACE TO START", canvas.width / 2, canvas.height / 2 + 20);
          ctx.restore();
        }

        if (gameState.gameOver) {
            ctx.save();
            ctx.font = "bold 44px sans-serif";
            ctx.textAlign = "center";
            ctx.fillStyle = "#ff5555";
            ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2);
            ctx.restore();
        }

        if (gameState.won) {
          ctx.save();
          ctx.font = "bold 44px sans-serif";
          ctx.textAlign = "center";
          ctx.strokeStyle = "rgba(251, 113, 133, 0.75)";
          ctx.lineWidth = 6;
          ctx.strokeText("CLEAR!", canvas.width / 2, canvas.height / 2 - 18);
          ctx.fillStyle = "#fef3c7";
          ctx.fillText("CLEAR!", canvas.width / 2, canvas.height / 2 - 18);
          ctx.font = "bold 20px sans-serif";
          ctx.fillStyle = "rgba(248, 250, 252, 0.95)";
          ctx.fillText("ボスを撃破しました", canvas.width / 2, canvas.height / 2 + 14);
          ctx.restore();
        }
      }

      function draw() {
        drawBackground();
        drawBossBullets();
        enemies.forEach(drawEnemy);
        drawBullets();
        drawItems();
        drawBoss();
        drawParticles();
        drawPlayer();
        drawStatusOverlay();
      }

      function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
      }

      let spaceHeld = false;

      function handleKeyDown(event) {
        if (gameState.inputLocked) {
          event.preventDefault();
          return;
        }

        if (event.code === "ArrowLeft" || event.code === "KeyA") {
          keys.ArrowLeft = true;
          keys.KeyA = true;
          event.preventDefault();
        } else if (event.code === "ArrowRight" || event.code === "KeyD") {
          keys.ArrowRight = true;
          keys.KeyD = true;
          event.preventDefault();
        } else if (event.code === "Space") {
          if (spaceHeld) {
            event.preventDefault();
            return;
          }
          spaceHeld = true;
          event.preventDefault();
          if (!gameState.running) {
            if (gameState.gameOver || gameState.won) {
              resetGame();
            }
            startGame();
          } else if (!gameState.gameOver && !gameState.won) {
            fireBullet();
          } else {
            resetGame();
            startGame();
          }
        }
      }

      function handleKeyUp(event) {
        if (event.code === "Space") {
          spaceHeld = false;
        }
        if (event.code === "ArrowLeft" || event.code === "KeyA") {
          keys.ArrowLeft = false;
          keys.KeyA = false;
        } else if (event.code === "ArrowRight" || event.code === "KeyD") {
          keys.ArrowRight = false;
          keys.KeyD = false;
        }
      }

      window.addEventListener("keydown", handleKeyDown);
      window.addEventListener("keyup", handleKeyUp);
      window.addEventListener("blur", () => {
        keys.ArrowLeft = false;
        keys.ArrowRight = false;
        keys.KeyA = false;
        keys.KeyD = false;
      });

      resetGame();
      loop();
    </script>
  </body>
</html>
