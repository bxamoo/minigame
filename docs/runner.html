<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Runner Game</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <main class="game-page">

    <section class="game-screen">

      <div class="game-layout">

        <!-- ゲーム画面 -->
        <div class="play-panel">

          <div class="game-shell">

            <canvas
              id="c"
              width="520"
              height="300">
            </canvas>

          </div>

        </div>

        <!-- 情報 -->
        <div class="info-panel">

          <h1>Night Runner</h1>

          <p class="description">
            Spaceキーでジャンプ！<br>
            障害物を避けてできるだけ遠くまで走ろう！
          </p>

          <div class="hud">

            <div class="hud-row">

              <div class="hud-stat">
                <span id="s">距離：0</span>
              </div>

              <div class="hud-status">
                Spaceでジャンプ
              </div>

            </div>

          </div>

          <div class="shooting-controls">

            <h2>遊び方</h2>

            <ul>
              <li>Spaceキーでジャンプします。</li>
              <li>障害物にぶつかるとゲームオーバーです。</li>
              <li>遠くまで走るほどスコアが伸びます。</li>
            </ul>

          </div>

          <div style="display:flex; gap:12px;">

<button
  class="primary-button"
  type="button"
  onclick="this.blur(); reset();">
              もう一度遊ぶ
            </button>

            <a
              class="secondary-button"
              href="index.html">
              トップに戻る
            </a>

          </div>

        </div>

      </div>

    </section>

  </main>

  <script>

    const c = document.getElementById("c");
    const x = c.getContext("2d");
    const S = document.getElementById("s");

    let p;
    let o;
    let d;
    let v;
    let g;
    let started = false;
const stars = [];

for (let i = 0; i < 40; i++) {

  stars.push({
    x: Math.random() * 520,
    y: Math.random() * 150,
    r: Math.random() * 2 + 1
  });

}
    function reset() {

      p = {
        x: 80,
        y: 220,
        w: 30,
        h: 40,
        v: 0
      };

      o = [];
      d = 0;
      v = 6;
      g = false;
      started = false;

    }

    reset();

onkeydown = (e) => {

  if (e.code !== "Space") return;

  // ゲームオーバー中は何もしない
  if (g) return;

  // 最初のSpaceでスタート
  if (!started) {
    started = true;
    return;
  }

  // スタート後はジャンプ
  if (p.y >= 220) {
    p.v = -14;
  }

};
function drawBackground() {

  // 夜空
  x.fillStyle = "#071126";
  x.fillRect(0, 0, 520, 300);

  // 月
  x.beginPath();
  x.arc(430, 55, 28, 0, Math.PI * 2);
  x.fillStyle = "#f8f1b5";
  x.fill();

  // 星
  x.fillStyle = "#ffffff";

  stars.forEach(star => {

    x.beginPath();
    x.arc(star.x, star.y, star.r, 0, Math.PI * 2);
    x.fill();

  });

  // 山
  x.fillStyle = "#1a2442";

  x.beginPath();
  x.moveTo(0,260);
  x.lineTo(80,180);
  x.lineTo(170,260);
  x.fill();

  x.beginPath();
  x.moveTo(120,260);
  x.lineTo(250,160);
  x.lineTo(360,260);
  x.fill();

  x.beginPath();
  x.moveTo(280,260);
  x.lineTo(420,190);
  x.lineTo(520,260);
  x.fill();

  // 地面
  x.fillStyle = "#315d2b";
  x.fillRect(0,260,520,40);

}
    function spawn() {

      if (Math.random() < 0.02) {

        o.push({
          x: 820,
          w: 20 + Math.random() * 20,
          h: 30 + Math.random() * 30
        });

      }

    }
function drawPlayer() {

  const bodyX = p.x + p.w / 2;
  const wobble = Math.sin(d * 0.2) * 2;
  const bodyY = p.y + p.h / 2 + wobble;

  // 足の横シャカシャカ動き
  const legSwing = Math.sin(d * 0.5) * 4; // 左右に動く量

  // 体（丸）
  x.fillStyle = "#111";
  x.beginPath();
  x.arc(bodyX, bodyY, 18, 0, Math.PI * 2);
  x.fill();

  // 目（白）
  x.fillStyle = "#fff";
  x.beginPath();
  x.arc(bodyX - 6, bodyY - 4, 4, 0, Math.PI * 2);
  x.arc(bodyX + 6, bodyY - 4, 4, 0, Math.PI * 2);
  x.fill();

  // 黒目
  x.fillStyle = "#000";
  x.beginPath();
  x.arc(bodyX - 6, bodyY - 4, 2, 0, Math.PI * 2);
  x.arc(bodyX + 6, bodyY - 4, 2, 0, Math.PI * 2);
  x.fill();

  // 左足（体にくっつける）
  x.fillStyle = "#111";
  x.beginPath();
  x.arc(bodyX - 12 + legSwing, bodyY + 16, 5, 0, Math.PI * 2);
  x.fill();

  // 右足（体にくっつける）
  x.beginPath();
  x.arc(bodyX + 12 - legSwing, bodyY + 16, 5, 0, Math.PI * 2);
  x.fill();
}

    function loop() {

      requestAnimationFrame(loop);

      drawBackground();

      // ゲーム進行
if (started && !g) {

    d++;
    v += 0.0005;

    spawn();

}
      // ジャンプ
if (started) {

    p.v = (p.v || 0) + 0.7;
    p.y += p.v;

}

      if (p.y > 220) {

        p.y = 220;
        p.v = 0;

      }

      // プレイヤー
      drawPlayer();

      // 障害物
      x.fillStyle = "#444";

      o.forEach(a => {

if (started && !g) {
    a.x -= v;
}

        x.fillRect(
          a.x,
          260 - a.h,
          a.w,
          a.h
        );

        // 当たり判定
        if (
          a.x + a.w > p.x &&
          a.x < p.x + p.w &&
          260 - a.h < p.y + p.h
        ) {
          g = true;
        }

      });

      // 画面外を削除
      o = o.filter(a => a.x > -50);

      // スコア表示
      if (g) {
        S.textContent = "ゲームオーバー！ 距離：" + d;
      } else {
        S.textContent = "距離：" + d;
      }

    }

    loop();

  </script>

</body>

</html>
