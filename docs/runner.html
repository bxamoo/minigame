<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Runner Game</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <main class="game-page">

    <section class="game-screen">

      <div class="game-layout">

        <!-- ゲーム画面 -->
        <div class="play-panel">

          <div class="game-shell">

            <canvas
              id="c"
              width="520"
              height="300">
            </canvas>

          </div>

        </div>

        <!-- 情報 -->
        <div class="info-panel">

          <h1>Night Runner</h1>

          <p class="description">
            Spaceキーでジャンプ！<br>
            障害物を避けてできるだけ遠くまで走ろう！
          </p>

          <div class="hud">

            <div class="hud-row hud-row-single">

              <div class="hud-stat hud-stat-wide">
                <span id="s">距離：0</span>
              </div>

            </div>

            <div class="hud-row">

              <div class="hud-stat">
                <span id="best">最高記録：0</span>
              </div>

              <div class="hud-status hud-status-secondary" id="secondary">
                障害物を避けて距離を伸ばそう
              </div>

            </div>

          </div>

          <div class="action-row">

            <h2>遊び方</h2>

            <ul>
              <li>Spaceキーでジャンプします。</li>
              <li>障害物にぶつかるとゲームオーバーです。</li>
              <li>遠くまで走るほどスコアが伸びます。</li>
            </ul>

          </div>

          <div class="action-row">
            <button
              class="primary-button"
              type="button"
              onclick="this.blur(); reset();">
              もう一度遊ぶ
            </button>
            <a
              class="secondary-button"
              href="index.html">
              トップに戻る
            </a>
          </div>

        </div>

      </div>

    </section>

  </main>

  <script>

    const c = document.getElementById("c");
    const x = c.getContext("2d");
    const S = document.getElementById("s");
    const B = document.getElementById("best");
    const secondaryStatus = document.getElementById("secondary");

    let p;
    let o;
    let d;
    let v;
    let g;
    let started = false;
    let gameOverTimer = 0;
    let best = Number(localStorage.getItem("runnerBest") || 0);
    const stars = [];
    let backgroundOffset = 0;
    let backgroundSceneIndex = 0;
    let spawnTimer = 0;
    let nextSpawnGap = 170;
    const backgroundScenes = [
      [
        { type: "mountain", x1: -40, x2: 100, x3: 220, top: 182 },
        { type: "mountain", x1: 120, x2: 250, x3: 360, top: 158 },
        { type: "mountain", x1: 280, x2: 430, x3: 560, top: 190 }
      ],
      [
        { type: "house", x: 40, y: 215, w: 44, h: 36, roof: 16 },
        { type: "house", x: 120, y: 222, w: 42, h: 30, roof: 14 },
        { type: "house", x: 200, y: 214, w: 48, h: 38, roof: 16 },
        { type: "house", x: 300, y: 224, w: 40, h: 28, roof: 14 },
        { type: "house", x: 380, y: 216, w: 46, h: 36, roof: 16 }
      ],
      [
        { type: "castle", x: 70, y: 182, w: 120, h: 78 },
        { type: "castle", x: 210, y: 198, w: 96, h: 62 },
        { type: "castle", x: 340, y: 188, w: 110, h: 72 }
      ],
      [
        { type: "dragon", x: 80, y: 160, scale: 1 },
        { type: "dragon", x: 260, y: 192, scale: 0.72 }
      ],
      [
        { type: "ufo", x: 90, y: 120, w: 150, h: 40 },
        { type: "ufo", x: 300, y: 148, w: 110, h: 30 }
      ]
    ];
for (let i = 0; i < 40; i++) {

  stars.push({
    x: Math.random() * 520,
    y: Math.random() * 150,
    r: Math.random() * 2 + 1
  });

}
    function reset() {

      p = {
        x: 80,
        y: 220,
        w: 30,
        h: 40,
        v: 0
      };

      o = [];
      d = 0;
      v = 4.8;
      g = false;
      started = false;
      gameOverTimer = 0;
      spawnTimer = 140;
      nextSpawnGap = 180;
      B.textContent = "最高記録：" + best;
      secondaryStatus.textContent = "障害物を避けて距離を伸ばそう";

    }

    reset();

    function drawBackgroundScene(scene, offset) {
      x.save();
      x.translate(offset, 0);
      x.fillStyle = "#1a2442";
      x.strokeStyle = "#0f1832";
      x.lineWidth = 2;

      scene.forEach(shape => {
        if (shape.type === "mountain") {
          x.beginPath();
          x.moveTo(shape.x1, 260);
          x.lineTo(shape.x2, shape.top);
          x.lineTo(shape.x3, 260);
          x.closePath();
          x.fill();
          x.stroke();
          return;
        }

        if (shape.type === "house") {
          x.fillRect(shape.x, shape.y + 8, shape.w, shape.h - 8);
          x.beginPath();
          x.moveTo(shape.x - 6, shape.y + 8);
          x.lineTo(shape.x + shape.w / 2, shape.y - shape.roof);
          x.lineTo(shape.x + shape.w + 6, shape.y + 8);
          x.closePath();
          x.fill();
          x.stroke();
          x.fillRect(shape.x + 10, shape.y + 18, 8, 14);
          x.fillRect(shape.x + 26, shape.y + 18, 8, 14);
          return;
        }

if (shape.type === "castle") {

  x.fillStyle = "#1a2442";

  // 城本体
  x.fillRect(shape.x + 20, shape.y + 30, shape.w - 40, shape.h - 30);

  // 左塔
  x.fillRect(shape.x, shape.y + 10, 24, shape.h + 10);

  // 中央塔
  x.fillRect(shape.x + shape.w / 2 - 16, shape.y - 10, 32, shape.h + 30);

  // 右塔
  x.fillRect(shape.x + shape.w - 24, shape.y + 10, 24, shape.h + 10);

  // ギザギザ
  for(let i=0;i<7;i++){
      x.fillRect(shape.x+20+i*12,shape.y+24,6,8);
  }

  for(let i=0;i<3;i++){
      x.fillRect(shape.x+2+i*8,shape.y+4,5,7);
      x.fillRect(shape.x+shape.w-22+i*8,shape.y+4,5,7);
  }

  // 旗
  x.strokeStyle="#555";
  x.lineWidth=2;

  x.beginPath();
  x.moveTo(shape.x+shape.w/2,shape.y-10);
  x.lineTo(shape.x+shape.w/2,shape.y-30);
  x.stroke();

  x.fillStyle="#ff4040";
  x.beginPath();
  x.moveTo(shape.x+shape.w/2,shape.y-30);
  x.lineTo(shape.x+shape.w/2+16,shape.y-24);
  x.lineTo(shape.x+shape.w/2,shape.y-18);
  x.fill();
}

if (shape.type === "dragon") {

    const s=shape.scale;
    const X=shape.x;
    const Y=shape.y;

x.fillStyle="#334d78";
x.strokeStyle="#0b1225";

    // 胴体
    x.beginPath();
    x.ellipse(X+70*s,Y+40*s,40*s,14*s,0,0,Math.PI*2);
    x.fill();

    // 頭
    x.beginPath();
    x.arc(X+118*s,Y+35*s,12*s,0,Math.PI*2);
    x.fill();

    // 首
    x.lineWidth=10*s;
    x.strokeStyle="#1a2442";
    x.beginPath();
    x.moveTo(X+90*s,Y+38*s);
    x.quadraticCurveTo(X+105*s,Y+20*s,X+116*s,Y+34*s);
    x.stroke();

    // 翼（左）
    x.beginPath();
    x.moveTo(X+55*s,Y+30*s);
    x.lineTo(X+15*s,Y-10*s);
    x.lineTo(X+80*s,Y+10*s);
    x.closePath();
    x.fill();

    // 翼（右）
    x.beginPath();
    x.moveTo(X+78*s,Y+28*s);
    x.lineTo(X+40*s,Y-20*s);
    x.lineTo(X+110*s,Y+6*s);
    x.closePath();
    x.fill();

    // 尻尾
    x.lineWidth=6*s;
    x.beginPath();
    x.moveTo(X+28*s,Y+40*s);
    x.quadraticCurveTo(X-10*s,Y+55*s,X-25*s,Y+25*s);
    x.stroke();

    // 角
    x.beginPath();
    x.moveTo(X+116*s,Y+20*s);
    x.lineTo(X+122*s,Y+10*s);
    x.lineTo(X+110*s,Y+18*s);
    x.fill();

    // 赤い目
    x.fillStyle="#ff3030";
    x.beginPath();
    x.arc(X+122*s,Y+34*s,2*s,0,Math.PI*2);
    x.fill();
}
if (shape.type==="ufo"){

    const cx=shape.x+shape.w/2;

    // 下皿
    x.fillStyle="#26344d";
    x.beginPath();
    x.ellipse(cx,shape.y+26,shape.w/2,14,0,0,Math.PI*2);
    x.fill();

    // ドーム
    x.fillStyle="#8fd8ff";
    x.beginPath();
    x.ellipse(cx, shape.y + 16, shape.w / 4, 12, 0, Math.PI, Math.PI * 2);
    x.fill();

    // 窓
    x.fillStyle="#ffe97a";

    for(let i=-2;i<=2;i++){
        x.beginPath();
        x.arc(cx+i*18,shape.y+24,3,0,Math.PI*2);
        x.fill();
    }

    // 光線
    x.fillStyle="rgba(255,255,180,.18)";
    x.beginPath();
    x.moveTo(cx-18,shape.y+38);
    x.lineTo(cx+18,shape.y+38);
    x.lineTo(cx+42,260);
    x.lineTo(cx-42,260);
    x.closePath();
    x.fill();
}
      });

      x.restore();
    }

document.addEventListener("keydown", (e) => {

  if (e.code !== "Space") return;
  e.preventDefault();

  if (e.repeat) return;

  // ゲームオーバー中は何もしない
  if (g) return;

  // 最初のSpaceでスタート
  if (!started) {
    started = true;
    return;
  }

  // スタート後はジャンプ
  if (p.y >= 220) {
    p.v = -11.2;
  }

});
function drawBackground() {

  // 夜空
  x.fillStyle = "#071126";
  x.fillRect(0, 0, 520, 300);

  // 月
  x.beginPath();
  x.arc(430, 55, 28, 0, Math.PI * 2);
  x.fillStyle = "#f8f1b5";
  x.fill();

  // 星
  x.fillStyle = "#ffffff";

  stars.forEach(star => {

    x.beginPath();
    x.arc(star.x, star.y, star.r, 0, Math.PI * 2);
    x.fill();

  });

  // 背景シルエット
  drawBackgroundScene(backgroundScenes[backgroundSceneIndex], backgroundOffset);

  // 地面
  x.fillStyle = "#315d2b";
  x.fillRect(0, 260, 520, 40);
  x.fillStyle = "#1b2f45";
  x.fillRect(0, 260, 520, 4);

}
    function spawn() {

      if (spawnTimer > 0) {
        spawnTimer -= Math.max(1.2, v * 0.8);
        return;
      }

      const hasObstacleAhead = o.some(ob => ob.x > 220 && ob.x < 500);
      if (hasObstacleAhead) {
        spawnTimer = 30;
        return;
      }

const types = [
  "rock",
  "poop",
  "fire",
  "bush"
];

const type = types[Math.floor(Math.random() * types.length)];
      let size = 22;
      let height = 24;
      let gapBonus = 0;

      if (type === "rock") {
        size = 24 + Math.random() * 12;
        height = 24 + Math.random() * 12;
      } else if (type === "barrel") {
        size = 28 + Math.random() * 10;
        height = 32 + Math.random() * 8;
        gapBonus = 45;
      } else {
        size = 18 + Math.random() * 8;
        height = 18 + Math.random() * 8;
        gapBonus = 20;
      }

      o.push({
        x: 820,
        type,
        w: size,
        h: height
      });

      spawnTimer = nextSpawnGap + gapBonus;
      nextSpawnGap = 155 + Math.random() * 40 + (type === "barrel" ? 25 : 0);

    }

function updateGameOverAnimation() {
  if (!g) return;

  gameOverTimer++;

  if (gameOverTimer < 18) {
    p.y -= 5;
  } else if (p.y < 320) {
    p.y += 8;
  }
}

function drawPlayer() {

  const bodyX = p.x + p.w / 2;
  const wobble = Math.sin(d * 0.25) * 1;
  const bodyY = p.y + p.h / 2 + wobble;

  const legSwing = Math.sin(d * 0.7) * 1.2;

  //--------------------
  // 体
  //--------------------
  x.fillStyle = g ? "#8b0000" : "#000";
  x.beginPath();
  x.arc(bodyX, bodyY, 11, 0, Math.PI * 2);
  x.fill();

  //--------------------
  // 白目
  //--------------------
  x.fillStyle = "#fff";
  x.beginPath();
  x.ellipse(bodyX - 3.5, bodyY - 1.5, 3.5, 5, 0, 0, Math.PI * 2);
  x.ellipse(bodyX + 3.5, bodyY - 1.5, 3.5, 5, 0, 0, Math.PI * 2);
  x.fill();

  //--------------------
  // 黒目
  //--------------------
  x.fillStyle = "#000";
  x.beginPath();
  x.arc(bodyX - 2.5, bodyY - 1.5, 2.5, 0, Math.PI * 2);
  x.arc(bodyX + 5, bodyY - 1.5, 2.5, 0, Math.PI * 2);
  x.fill();

  //--------------------
  // 足（短め）
  //--------------------
  x.strokeStyle = "#000";
  x.lineWidth = 2.5;

  // 左足
  x.beginPath();
  x.moveTo(bodyX - 4, bodyY + 12);
  x.lineTo(bodyX - 4 + legSwing, bodyY + 16);
  x.stroke();

  // 右足
  x.beginPath();
  x.moveTo(bodyX + 4, bodyY + 12);
  x.lineTo(bodyX + 4 - legSwing, bodyY + 16);
  x.stroke();

  //--------------------
  // 足先
  //--------------------
  x.fillStyle = "#000";

  // 左
  x.beginPath();
  x.ellipse(
    bodyX - 4 + legSwing,
    bodyY + 18,
    4,
    2.5,
    0,
    0,
    Math.PI * 2
  );
  x.fill();

  // 右
  x.beginPath();
  x.ellipse(
    bodyX + 4 - legSwing,
    bodyY + 18,
    4,
    2.5,
    0,
    0,
    Math.PI * 2
  );
  x.fill();
}
    function loop() {

      requestAnimationFrame(loop);

      drawBackground();

      // ゲーム進行
      if (!g) {
        backgroundOffset -= 0.35;
        if (backgroundOffset <= -520) {
          backgroundOffset = 520;
          backgroundSceneIndex = (backgroundSceneIndex + 1) % backgroundScenes.length;
        }
      }

      if (started && !g) {
        d++;
        v += 0.00028;
        spawn();
      }

      if (started) {
        p.v = (p.v || 0) + 0.58;
        p.y += p.v;
      }

      if (g) {
        updateGameOverAnimation();
      }

      if (p.y > 220 && !g) {
        p.y = 220;
        p.v = 0;
      }

      // プレイヤー
      drawPlayer();

      // 障害物
      o.forEach(a => {
        if (started && !g) {
          a.x -= v;
        }

        if (a.type === "rock") {
          const baseY = 260 - a.h * 0.82;
          x.fillStyle = "#6f7480";
          x.strokeStyle = "#3f434c";
          x.lineWidth = 2;
          x.beginPath();
          x.moveTo(a.x + a.w * 0.16, baseY + a.h * 0.22);
          x.lineTo(a.x + a.w * 0.04, baseY + a.h * 0.64);
          x.lineTo(a.x + a.w * 0.18, baseY + a.h * 0.92);
          x.lineTo(a.x + a.w * 0.38, baseY + a.h * 0.82);
          x.lineTo(a.x + a.w * 0.58, baseY + a.h * 0.96);
          x.lineTo(a.x + a.w * 0.8, baseY + a.h * 0.74);
          x.lineTo(a.x + a.w * 0.96, baseY + a.h * 0.56);
          x.lineTo(a.x + a.w * 0.84, baseY + a.h * 0.16);
          x.lineTo(a.x + a.w * 0.58, baseY + a.h * 0.02);
          x.lineTo(a.x + a.w * 0.32, baseY + a.h * 0.08);
          x.closePath();
          x.fill();
          x.stroke();

          x.fillStyle = "rgba(255,255,255,0.16)";
          x.beginPath();
          x.moveTo(a.x + a.w * 0.2, baseY + a.h * 0.18);
          x.lineTo(a.x + a.w * 0.34, baseY + a.h * 0.08);
          x.lineTo(a.x + a.w * 0.54, baseY + a.h * 0.38);
          x.closePath();
          x.fill();
        }

if (a.type === "bush") {

  const y = 260;

  x.fillStyle = "#2e8b3c";

  x.beginPath();

  x.arc(a.x + 8, y - 10, 8, 0, Math.PI * 2);
  x.arc(a.x + 16, y - 15, 10, 0, Math.PI * 2);
  x.arc(a.x + 27, y - 11, 8, 0, Math.PI * 2);

  x.fill();

  x.fillStyle = "#49a857";

  x.beginPath();

  x.arc(a.x + 14, y - 16, 3, 0, Math.PI * 2);
  x.arc(a.x + 22, y - 12, 2.5, 0, Math.PI * 2);

  x.fill();
}
if (a.type === "poop") {

  const cx = a.x + a.w / 2;
  const y = 260;

  x.fillStyle = "#7b4b1f";

  // 下段
  x.beginPath();
  x.ellipse(cx, y - 7, 10, 5, 0, 0, Math.PI * 2);
  x.fill();

  // 中段
  x.beginPath();
  x.ellipse(cx, y - 13, 8, 4.5, 0, 0, Math.PI * 2);
  x.fill();

  // 上段
  x.beginPath();
  x.ellipse(cx, y - 18, 5, 3.5, 0, 0, Math.PI * 2);
  x.fill();

  // 先端
  x.beginPath();
  x.moveTo(cx, y - 25);
  x.lineTo(cx + 2, y - 20);
  x.lineTo(cx - 2, y - 20);
  x.closePath();
  x.fill();

  // ハイライト
  x.fillStyle = "rgba(255,255,255,.18)";
  x.beginPath();
  x.arc(cx - 3, y - 15, 1.8, 0, Math.PI * 2);
  x.fill();
}
if (a.type === "fire") {

  const y = 260;

  // 木
  x.strokeStyle = "#5d3a18";
  x.lineWidth = 3;

  x.beginPath();
  x.moveTo(a.x + 6, y - 4);
  x.lineTo(a.x + 18, y - 12);

  x.moveTo(a.x + 18, y - 4);
  x.lineTo(a.x + 6, y - 12);
  x.stroke();

  // 炎（外）
  x.fillStyle = "#ff8c00";
  x.beginPath();
  x.moveTo(a.x + 12, y - 26);
  x.quadraticCurveTo(a.x + 25, y - 14, a.x + 12, y - 4);
  x.quadraticCurveTo(a.x - 1, y - 14, a.x + 12, y - 26);
  x.fill();

  // 炎（内）
  x.fillStyle = "#ffe45c";
  x.beginPath();
  x.moveTo(a.x + 12, y - 20);
  x.quadraticCurveTo(a.x + 18, y - 13, a.x + 12, y - 6);
  x.quadraticCurveTo(a.x + 6, y - 13, a.x + 12, y - 20);
  x.fill();
}

        // 当たり判定
        if (
          a.x + a.w > p.x &&
          a.x < p.x + p.w &&
          260 - a.h < p.y + p.h
        ) {
          g = true;
        }
      });

      o = o.filter(a => a.x > -150);

      if (g && gameOverTimer === 1) {
        if (d > best) {
          best = d;
          localStorage.setItem("runnerBest", best);
          B.textContent = "最高記録：" + best;
        }
        secondaryStatus.textContent = "ゲームオーバー！ もう一度遊んで挑戦しよう";
      }

      if (g) {
        S.textContent = "ゲームオーバー！ 距離：" + d;
      } else {
        S.textContent = "距離：" + d;
      }
    }

    loop();

  </script>

</body>

</html>
