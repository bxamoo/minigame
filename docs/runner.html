<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Runner Game</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <main class="game-page">

    <section class="game-screen">

      <div class="game-layout">

        <!-- ゲーム画面 -->
        <div class="play-panel">

          <div class="game-shell">

            <canvas
              id="c"
              width="480"
              height="300">
            </canvas>

          </div>

        </div>

        <!-- 情報 -->
        <div class="info-panel">

          <h1>Night Runner</h1>

          <p class="description">
            Spaceキーでジャンプ！<br>
            障害物を避けてできるだけ遠くまで走ろう！
          </p>

          <div class="hud">

            <div class="hud-row">

              <div class="hud-stat">
                <span id="s">距離：0</span>
              </div>

              <div class="hud-status">
                Spaceでジャンプ
              </div>

            </div>

          </div>

          <div class="shooting-controls">

            <h2>遊び方</h2>

            <ul>
              <li>Spaceキーでジャンプします。</li>
              <li>障害物にぶつかるとゲームオーバーです。</li>
              <li>遠くまで走るほどスコアが伸びます。</li>
            </ul>

          </div>

          <div style="display:flex; gap:12px;">

            <button
              class="primary-button"
              onclick="reset()">
              もう一度遊ぶ
            </button>

            <a
              class="secondary-button"
              href="index.html">
              トップに戻る
            </a>

          </div>

        </div>

      </div>

    </section>

  </main>

  <script>

    const c = document.getElementById("c");
    const x = c.getContext("2d");
    const S = document.getElementById("s");

    let p;
    let o;
    let d;
    let v;
    let g;

    function reset() {

      p = {
        x: 80,
        y: 220,
        w: 30,
        h: 40
      };

      o = [];
      d = 0;
      v = 6;
      g = false;

    }

    reset();

    onkeydown = (e) => {

      if (
        e.code === "Space" &&
        !g &&
        p.y >= 220
      ) {
        p.v = -14;
      }

    };

    function spawn() {

      if (Math.random() < 0.02) {

        o.push({
          x: 820,
          w: 20 + Math.random() * 20,
          h: 30 + Math.random() * 30
        });

      }

    }

    function loop() {

      requestAnimationFrame(loop);

      // 空
      x.fillStyle = "#87ceeb";
      x.fillRect(0, 0, 480, 300);

      // 地面
      x.fillStyle = "#3a5";
      x.fillRect(0, 260, 480, 40);

      // ゲーム進行
      if (!g) {

        d++;
        v += 0.0005;

        spawn();

      }

      // ジャンプ
      p.v = (p.v || 0) + 0.7;
      p.y += p.v;

      if (p.y > 220) {

        p.y = 220;
        p.v = 0;

      }

      // プレイヤー
      x.fillStyle = "#f90";
      x.fillRect(
        p.x,
        p.y,
        p.w,
        p.h
      );

      // 障害物
      x.fillStyle = "#444";

      o.forEach(a => {

        if (!g) {
          a.x -= v;
        }

        x.fillRect(
          a.x,
          260 - a.h,
          a.w,
          a.h
        );

        // 当たり判定
        if (
          a.x + a.w > p.x &&
          a.x < p.x + p.w &&
          260 - a.h < p.y + p.h
        ) {
          g = true;
        }

      });

      // 画面外を削除
      o = o.filter(a => a.x > -50);

      // スコア表示
      if (g) {
        S.textContent = "ゲームオーバー！ 距離：" + d;
      } else {
        S.textContent = "距離：" + d;
      }

    }

    loop();

  </script>

</body>

</html>
