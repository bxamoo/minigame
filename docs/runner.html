<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Runner Game</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <main class="game-page">

    <section class="game-screen">

      <div class="game-layout">

        <!-- ゲーム画面 -->
        <div class="play-panel">

          <div class="game-shell">

            <canvas
              id="c"
              width="520"
              height="300">
            </canvas>

          </div>

        </div>

        <!-- 情報 -->
        <div class="info-panel">

          <h1>Night Runner</h1>

          <p class="description">
            Spaceキーでジャンプ！<br>
            障害物を避けてできるだけ遠くまで走ろう！
          </p>

          <div class="hud">

            <div class="hud-row">

              <div class="hud-stat">
                <span id="s">距離：0</span>
              </div>

              <div class="hud-status" id="status">
                Spaceでジャンプ
              </div>

            </div>

            <div class="hud-row">

              <div class="hud-stat">
                <span id="best">最高記録：0</span>
              </div>

              <div class="hud-status hud-status-secondary" id="secondary">
                障害物を避けて距離を伸ばそう
              </div>

            </div>

          </div>

          <div class="item-legend">
            <h2>障害物</h2>
            <div class="legend-item">
              <span class="legend-icon rock"></span>
              <div><strong>岩</strong><p>尖った岩をジャンプで避ける</p></div>
            </div>
            <div class="legend-item">
              <span class="legend-icon stump"></span>
              <div><strong>切り株</strong><p>丸太の切り株に注意</p></div>
            </div>
            <div class="legend-item">
              <span class="legend-icon poop"></span>
              <div><strong>うんこ</strong><p>ぶつかるとゲームオーバー</p></div>
            </div>
            <div class="legend-item">
              <span class="legend-icon valley"></span>
              <div><strong>谷</strong><p>地面が途切れる落とし穴</p></div>
            </div>
          </div>

          <div class="action-row">

            <h2>遊び方</h2>

            <ul>
              <li>Spaceキーでジャンプします。</li>
              <li>障害物にぶつかるとゲームオーバーです。</li>
              <li>遠くまで走るほどスコアが伸びます。</li>
            </ul>

          </div>

          <div class="action-row">
            <button
              class="primary-button"
              type="button"
              onclick="this.blur(); reset();">
              もう一度遊ぶ
            </button>
            <a
              class="secondary-button"
              href="index.html">
              トップに戻る
            </a>
          </div>

        </div>

      </div>

    </section>

  </main>

  <script>

    const c = document.getElementById("c");
    const x = c.getContext("2d");
    const S = document.getElementById("s");
    const B = document.getElementById("best");
    const secondaryStatus = document.getElementById("secondary");

    let p;
    let o;
    let d;
    let v;
    let g;
    let started = false;
    let gameOverTimer = 0;
    let best = Number(localStorage.getItem("runnerBest") || 0);
    const stars = [];
    let bg = 0;
    const mountains = [
      { x1: 0, x2: 80, x3: 170, top: 180 },
      { x1: 120, x2: 250, x3: 360, top: 160 },
      { x1: 280, x2: 420, x3: 520, top: 190 }
    ];
for (let i = 0; i < 40; i++) {

  stars.push({
    x: Math.random() * 520,
    y: Math.random() * 150,
    r: Math.random() * 2 + 1
  });

}
    function reset() {

      p = {
        x: 80,
        y: 220,
        w: 30,
        h: 40,
        v: 0
      };

      o = [];
      d = 0;
      v = 6;
      g = false;
      started = false;
      gameOverTimer = 0;
      B.textContent = "最高記録：" + best;
      secondaryStatus.textContent = "障害物を避けて距離を伸ばそう";

    }

    reset();

onkeydown = (e) => {

  if (e.code !== "Space") return;

  // ゲームオーバー中は何もしない
  if (g) return;

  // 最初のSpaceでスタート
  if (!started) {
    started = true;
    return;
  }

  // スタート後はジャンプ
  if (p.y >= 220) {
    p.v = -14;
  }

};
function drawBackground() {

  // 夜空
  x.fillStyle = "#071126";
  x.fillRect(0, 0, 520, 300);

  // 月
  x.beginPath();
  x.arc(430, 55, 28, 0, Math.PI * 2);
  x.fillStyle = "#f8f1b5";
  x.fill();

  // 星
  x.fillStyle = "#ffffff";

  stars.forEach(star => {

    x.beginPath();
    x.arc(star.x, star.y, star.r, 0, Math.PI * 2);
    x.fill();

  });

  // 山
  x.fillStyle = "#1a2442";

  mountains.forEach(m => {
    const offset = (m.x1 + bg) % 520;
    const x1 = offset;
    const x2 = offset + (m.x2 - m.x1);
    const x3 = offset + (m.x3 - m.x1);

    x.beginPath();
    x.moveTo(x1, 260);
    x.lineTo(x2, m.top);
    x.lineTo(x3, 260);
    x.fill();

    if (x3 < 520) return;

    const wrap = offset - 520;
    x.beginPath();
    x.moveTo(wrap, 260);
    x.lineTo(wrap + (m.x2 - m.x1), m.top);
    x.lineTo(wrap + (m.x3 - m.x1), 260);
    x.fill();
  });

  // 地面
  x.fillStyle = "#315d2b";

  const valleyGaps = o
    .filter(ob => ob.type === "valley")
    .map(ob => ({ x: ob.x, w: ob.w }))
    .sort((a, b) => a.x - b.x);

  let groundX = 0;
  valleyGaps.forEach(gap => {
    const gapStart = Math.max(0, gap.x);
    const gapEnd = Math.min(520, gap.x + gap.w);
    if (gapStart > groundX) {
      x.fillRect(groundX, 260, gapStart - groundX, 40);
    }
    groundX = Math.max(groundX, gapEnd);
  });

  if (groundX < 520) {
    x.fillRect(groundX, 260, 520 - groundX, 40);
  }

  x.fillStyle = "#1b2f45";
  valleyGaps.forEach(gap => {
    const gapStart = Math.max(0, gap.x);
    const gapEnd = Math.min(520, gap.x + gap.w);
    if (gapEnd > 0 && gapStart < 520) {
      x.fillRect(gapStart, 260, 4, 40);
      x.fillRect(gapEnd - 4, 260, 4, 40);
    }
  });

}
    function spawn() {

      if (Math.random() < 0.025) {
        const types = ["rock", "stump", "poop", "valley"];
        const type = types[Math.floor(Math.random() * types.length)];

        if (type === "valley") {
          o.push({
            x: 820,
            type,
            w: 110 + Math.random() * 40
          });
        } else {
          const size = type === "rock" ? 22 + Math.random() * 16 : type === "stump" ? 18 + Math.random() * 18 : 18 + Math.random() * 12;
          const height = type === "poop" ? 20 + Math.random() * 12 : 22 + Math.random() * 18;
          o.push({
            x: 820,
            type,
            w: size,
            h: height
          });
        }
      }

    }

function updateGameOverAnimation() {
  if (!g) return;

  gameOverTimer++;

  if (gameOverTimer < 18) {
    p.y -= 5;
  } else if (p.y < 320) {
    p.y += 8;
  }
}

function drawPlayer() {

  const bodyX = p.x + p.w / 2;
  const wobble = Math.sin(d * 0.25) * 1;
  const bodyY = p.y + p.h / 2 + wobble;

  const legSwing = Math.sin(d * 0.7) * 1.2;

  //--------------------
  // 体
  //--------------------
  x.fillStyle = g ? "#8b0000" : "#000";
  x.beginPath();
  x.arc(bodyX, bodyY, 11, 0, Math.PI * 2);
  x.fill();

  //--------------------
  // 白目
  //--------------------
  x.fillStyle = "#fff";
  x.beginPath();
  x.ellipse(bodyX - 3.5, bodyY - 1.5, 3.5, 5, 0, 0, Math.PI * 2);
  x.ellipse(bodyX + 3.5, bodyY - 1.5, 3.5, 5, 0, 0, Math.PI * 2);
  x.fill();

  //--------------------
  // 黒目
  //--------------------
  x.fillStyle = "#000";
  x.beginPath();
  x.arc(bodyX - 2.5, bodyY - 1.5, 2.5, 0, Math.PI * 2);
  x.arc(bodyX + 5, bodyY - 1.5, 2.5, 0, Math.PI * 2);
  x.fill();

  //--------------------
  // 足（短め）
  //--------------------
  x.strokeStyle = "#000";
  x.lineWidth = 2.5;

  // 左足
  x.beginPath();
  x.moveTo(bodyX - 4, bodyY + 12);
  x.lineTo(bodyX - 4 + legSwing, bodyY + 16);
  x.stroke();

  // 右足
  x.beginPath();
  x.moveTo(bodyX + 4, bodyY + 12);
  x.lineTo(bodyX + 4 - legSwing, bodyY + 16);
  x.stroke();

  //--------------------
  // 足先
  //--------------------
  x.fillStyle = "#000";

  // 左
  x.beginPath();
  x.ellipse(
    bodyX - 4 + legSwing,
    bodyY + 18,
    4,
    2.5,
    0,
    0,
    Math.PI * 2
  );
  x.fill();

  // 右
  x.beginPath();
  x.ellipse(
    bodyX + 4 - legSwing,
    bodyY + 18,
    4,
    2.5,
    0,
    0,
    Math.PI * 2
  );
  x.fill();
}
    function loop() {

      requestAnimationFrame(loop);

      drawBackground();

      // ゲーム進行
      if (started && !g) {
        d++;
        v += 0.0005;
        bg -= v * 0.5;
        spawn();
      }

      if (started) {
        p.v = (p.v || 0) + 0.7;
        p.y += p.v;
      }

      if (g) {
        updateGameOverAnimation();
      }

      if (p.y > 220 && !g) {
        p.y = 220;
        p.v = 0;
      }

      // プレイヤー
      drawPlayer();

      // 障害物
      o.forEach(a => {
        if (started && !g) {
          a.x -= v;
        }

        if (a.type === "valley") {
          return;
        }

        if (a.type === "rock") {
          x.fillStyle = "#6b7280";
          x.beginPath();
          x.ellipse(a.x + a.w / 2, 260 - a.h / 2, a.w / 2, a.h / 2, 0, 0, Math.PI * 2);
          x.fill();
          x.fillStyle = "#9ca3af";
          x.beginPath();
          x.arc(a.x + a.w * 0.4, 260 - a.h * 0.75, a.w * 0.15, 0, Math.PI * 2);
          x.fill();
        }

        if (a.type === "stump") {
          x.fillStyle = "#7c4a18";
          x.fillRect(a.x, 260 - a.h, a.w, a.h);
          x.fillStyle = "#a16207";
          x.fillRect(a.x + 4, 260 - a.h, a.w - 8, 8);
          x.strokeStyle = "#5b3415";
          x.lineWidth = 2;
          x.beginPath();
          x.moveTo(a.x + 4, 260 - a.h + 4);
          x.lineTo(a.x + a.w - 4, 260 - a.h + 4);
          x.stroke();
        }

        if (a.type === "poop") {
          x.fillStyle = "#8b5e34";
          x.beginPath();
          x.arc(a.x + a.w * 0.5, 260 - a.h + 6, a.w * 0.26, 0, Math.PI * 2);
          x.arc(a.x + a.w * 0.42, 260 - a.h + 12, a.w * 0.18, 0, Math.PI * 2);
          x.arc(a.x + a.w * 0.58, 260 - a.h + 18, a.w * 0.14, 0, Math.PI * 2);
          x.fill();
          x.fillStyle = "#4b2e16";
          x.beginPath();
          x.arc(a.x + a.w * 0.42, 260 - a.h + 6, a.w * 0.05, 0, Math.PI * 2);
          x.arc(a.x + a.w * 0.56, 260 - a.h + 12, a.w * 0.05, 0, Math.PI * 2);
          x.fill();
        }

        // 当たり判定
        if (
          a.x + a.w > p.x &&
          a.x < p.x + p.w &&
          260 - a.h < p.y + p.h
        ) {
          g = true;
        }
      });

      if (!g) {
        const valleyUnder = o.find(ob => ob.type === "valley" && p.x + p.w > ob.x && p.x < ob.x + ob.w && p.y >= 220);
        if (valleyUnder) {
          g = true;
        }
      }

      o = o.filter(a => a.x > -150);

      if (g && gameOverTimer === 1) {
        if (d > best) {
          best = d;
          localStorage.setItem("runnerBest", best);
          B.textContent = "最高記録：" + best;
        }
        secondaryStatus.textContent = "ゲームオーバー！ もう一度遊んで挑戦しよう";
      }

      if (g) {
        S.textContent = "ゲームオーバー！ 距離：" + d;
      } else {
        S.textContent = "距離：" + d;
      }
    }

    loop();

  </script>

</body>

</html>
