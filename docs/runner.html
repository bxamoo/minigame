<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Runner Game</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <main class="game-page">

    <section class="game-screen">

      <div class="game-layout">

        <!-- ゲーム画面 -->
        <div class="play-panel">

          <div class="game-shell">

            <canvas
              id="c"
              width="520"
              height="300">
            </canvas>

          </div>

        </div>

        <!-- 情報 -->
        <div class="info-panel">

          <h1>Night Runner</h1>

          <p class="description">
            Spaceキーでジャンプ！<br>
            障害物を避けてできるだけ遠くまで走ろう！
          </p>

          <div class="hud">

            <div class="hud-row">

              <div class="hud-stat">
                <span id="s">距離：0</span>
              </div>

              <div class="hud-status" id="status">
                Spaceでジャンプ
              </div>

            </div>

            <div class="hud-row">

              <div class="hud-stat">
                <span id="best">最高記録：0</span>
              </div>

              <div class="hud-status hud-status-secondary" id="secondary">
                障害物を避けて距離を伸ばそう
              </div>

            </div>

          </div>

          <div class="action-row">

            <h2>遊び方</h2>

            <ul>
              <li>Spaceキーでジャンプします。</li>
              <li>障害物にぶつかるとゲームオーバーです。</li>
              <li>遠くまで走るほどスコアが伸びます。</li>
            </ul>

          </div>

          <div class="action-row">
            <button
              class="primary-button"
              type="button"
              onclick="this.blur(); reset();">
              もう一度遊ぶ
            </button>
            <a
              class="secondary-button"
              href="index.html">
              トップに戻る
            </a>
          </div>

        </div>

      </div>

    </section>

  </main>

  <script>

    const c = document.getElementById("c");
    const x = c.getContext("2d");
    const S = document.getElementById("s");
    const B = document.getElementById("best");
    const secondaryStatus = document.getElementById("secondary");

    let p;
    let o;
    let d;
    let v;
    let g;
    let started = false;
    let gameOverTimer = 0;
    let best = Number(localStorage.getItem("runnerBest") || 0);
    const stars = [];
    let bg = 0;
    let spawnTimer = 0;
    let nextSpawnGap = 170;
    const mountains = [
      { baseX: 600, width: 150, top: 182 },
      { baseX: 760, width: 220, top: 158 },
      { baseX: 930, width: 180, top: 188 }
    ];
for (let i = 0; i < 40; i++) {

  stars.push({
    x: Math.random() * 520,
    y: Math.random() * 150,
    r: Math.random() * 2 + 1
  });

}
    function reset() {

      p = {
        x: 80,
        y: 220,
        w: 30,
        h: 40,
        v: 0
      };

      o = [];
      d = 0;
      v = 4.8;
      g = false;
      started = false;
      gameOverTimer = 0;
      spawnTimer = 140;
      nextSpawnGap = 180;
      B.textContent = "最高記録：" + best;
      secondaryStatus.textContent = "障害物を避けて距離を伸ばそう";

    }

    reset();

document.addEventListener("keydown", (e) => {

  if (e.code !== "Space") return;
  e.preventDefault();

  if (e.repeat) return;

  // ゲームオーバー中は何もしない
  if (g) return;

  // 最初のSpaceでスタート
  if (!started) {
    started = true;
    return;
  }

  // スタート後はジャンプ
  if (p.y >= 220) {
    p.v = -11.2;
  }

});
function drawBackground() {

  // 夜空
  x.fillStyle = "#071126";
  x.fillRect(0, 0, 520, 300);

  // 月
  x.beginPath();
  x.arc(430, 55, 28, 0, Math.PI * 2);
  x.fillStyle = "#f8f1b5";
  x.fill();

  // 星
  x.fillStyle = "#ffffff";

  stars.forEach(star => {

    x.beginPath();
    x.arc(star.x, star.y, star.r, 0, Math.PI * 2);
    x.fill();

  });

  // 山
  x.fillStyle = "#1a2442";

  mountains.forEach(m => {
    const offset = m.baseX + bg * 0.12;
    const x1 = offset;
    const x2 = offset + m.width * 0.5;
    const x3 = offset + m.width;

    if (x3 < -40 || x1 > 560) return;

    x.beginPath();
    x.moveTo(x1, 260);
    x.lineTo(x2, m.top);
    x.lineTo(x3, 260);
    x.fill();
  });

  // 地面
  x.fillStyle = "#315d2b";
  x.fillRect(0, 260, 520, 40);
  x.fillStyle = "#1b2f45";
  x.fillRect(0, 260, 520, 4);

}
    function spawn() {

      if (spawnTimer > 0) {
        spawnTimer -= Math.max(1.2, v * 0.8);
        return;
      }

      const hasObstacleAhead = o.some(ob => ob.x > 220 && ob.x < 500);
      if (hasObstacleAhead) {
        spawnTimer = 30;
        return;
      }

      const types = ["rock", "barrel", "poop"];
      const type = types[Math.floor(Math.random() * types.length)];

      let size = 22;
      let height = 24;
      let gapBonus = 0;

      if (type === "rock") {
        size = 24 + Math.random() * 12;
        height = 24 + Math.random() * 12;
      } else if (type === "barrel") {
        size = 28 + Math.random() * 10;
        height = 32 + Math.random() * 8;
        gapBonus = 45;
      } else {
        size = 18 + Math.random() * 8;
        height = 18 + Math.random() * 8;
        gapBonus = 20;
      }

      o.push({
        x: 820,
        type,
        w: size,
        h: height
      });

      spawnTimer = nextSpawnGap + gapBonus;
      nextSpawnGap = 155 + Math.random() * 40 + (type === "barrel" ? 25 : 0);

    }

function updateGameOverAnimation() {
  if (!g) return;

  gameOverTimer++;

  if (gameOverTimer < 18) {
    p.y -= 5;
  } else if (p.y < 320) {
    p.y += 8;
  }
}

function drawPlayer() {

  const bodyX = p.x + p.w / 2;
  const wobble = Math.sin(d * 0.25) * 1;
  const bodyY = p.y + p.h / 2 + wobble;

  const legSwing = Math.sin(d * 0.7) * 1.2;

  //--------------------
  // 体
  //--------------------
  x.fillStyle = g ? "#8b0000" : "#000";
  x.beginPath();
  x.arc(bodyX, bodyY, 11, 0, Math.PI * 2);
  x.fill();

  //--------------------
  // 白目
  //--------------------
  x.fillStyle = "#fff";
  x.beginPath();
  x.ellipse(bodyX - 3.5, bodyY - 1.5, 3.5, 5, 0, 0, Math.PI * 2);
  x.ellipse(bodyX + 3.5, bodyY - 1.5, 3.5, 5, 0, 0, Math.PI * 2);
  x.fill();

  //--------------------
  // 黒目
  //--------------------
  x.fillStyle = "#000";
  x.beginPath();
  x.arc(bodyX - 2.5, bodyY - 1.5, 2.5, 0, Math.PI * 2);
  x.arc(bodyX + 5, bodyY - 1.5, 2.5, 0, Math.PI * 2);
  x.fill();

  //--------------------
  // 足（短め）
  //--------------------
  x.strokeStyle = "#000";
  x.lineWidth = 2.5;

  // 左足
  x.beginPath();
  x.moveTo(bodyX - 4, bodyY + 12);
  x.lineTo(bodyX - 4 + legSwing, bodyY + 16);
  x.stroke();

  // 右足
  x.beginPath();
  x.moveTo(bodyX + 4, bodyY + 12);
  x.lineTo(bodyX + 4 - legSwing, bodyY + 16);
  x.stroke();

  //--------------------
  // 足先
  //--------------------
  x.fillStyle = "#000";

  // 左
  x.beginPath();
  x.ellipse(
    bodyX - 4 + legSwing,
    bodyY + 18,
    4,
    2.5,
    0,
    0,
    Math.PI * 2
  );
  x.fill();

  // 右
  x.beginPath();
  x.ellipse(
    bodyX + 4 - legSwing,
    bodyY + 18,
    4,
    2.5,
    0,
    0,
    Math.PI * 2
  );
  x.fill();
}
    function loop() {

      requestAnimationFrame(loop);

      drawBackground();

      // ゲーム進行
      if (started && !g) {
        d++;
        v += 0.00028;
        bg -= v * 0.38;
        spawn();
      }

      if (started) {
        p.v = (p.v || 0) + 0.58;
        p.y += p.v;
      }

      if (g) {
        updateGameOverAnimation();
      }

      if (p.y > 220 && !g) {
        p.y = 220;
        p.v = 0;
      }

      // プレイヤー
      drawPlayer();

      // 障害物
      o.forEach(a => {
        if (started && !g) {
          a.x -= v;
        }

        if (a.type === "rock") {
          const baseY = 260 - a.h * 0.82;
          x.fillStyle = "#6f7480";
          x.strokeStyle = "#3f434c";
          x.lineWidth = 2;
          x.beginPath();
          x.moveTo(a.x + a.w * 0.16, baseY + a.h * 0.22);
          x.lineTo(a.x + a.w * 0.04, baseY + a.h * 0.64);
          x.lineTo(a.x + a.w * 0.18, baseY + a.h * 0.92);
          x.lineTo(a.x + a.w * 0.38, baseY + a.h * 0.82);
          x.lineTo(a.x + a.w * 0.58, baseY + a.h * 0.96);
          x.lineTo(a.x + a.w * 0.8, baseY + a.h * 0.74);
          x.lineTo(a.x + a.w * 0.96, baseY + a.h * 0.56);
          x.lineTo(a.x + a.w * 0.84, baseY + a.h * 0.16);
          x.lineTo(a.x + a.w * 0.58, baseY + a.h * 0.02);
          x.lineTo(a.x + a.w * 0.32, baseY + a.h * 0.08);
          x.closePath();
          x.fill();
          x.stroke();

          x.fillStyle = "rgba(255,255,255,0.16)";
          x.beginPath();
          x.moveTo(a.x + a.w * 0.2, baseY + a.h * 0.18);
          x.lineTo(a.x + a.w * 0.34, baseY + a.h * 0.08);
          x.lineTo(a.x + a.w * 0.54, baseY + a.h * 0.38);
          x.closePath();
          x.fill();
        }

        if (a.type === "barrel") {
          const barrelTop = 260 - a.h;
          x.fillStyle = "#8a4b1f";
          x.fillRect(a.x, barrelTop, a.w, a.h);
          x.fillStyle = "#c97b33";
          x.fillRect(a.x + 3, barrelTop + 4, a.w - 6, a.h - 8);
          x.fillStyle = "#70411a";
          x.fillRect(a.x + 5, barrelTop + 6, a.w - 10, 6);
          x.fillRect(a.x + 5, barrelTop + a.h - 13, a.w - 10, 6);
          x.strokeStyle = "#4d2d11";
          x.lineWidth = 2;
          x.beginPath();
          x.moveTo(a.x + 4, barrelTop + 8);
          x.lineTo(a.x + a.w - 4, barrelTop + 8);
          x.moveTo(a.x + 4, barrelTop + a.h - 8);
          x.lineTo(a.x + a.w - 4, barrelTop + a.h - 8);
          x.stroke();
        }

        if (a.type === "poop") {
          const baseX = a.x + a.w * 0.5;
          const baseY = 260 - a.h + 6;
          x.fillStyle = "#8c5a2b";
          x.beginPath();
          x.moveTo(baseX, baseY - a.h * 0.66);
          x.bezierCurveTo(baseX + a.w * 0.42, baseY - a.h * 0.82, baseX + a.w * 0.46, baseY + a.h * 0.18, baseX + a.w * 0.18, baseY + a.h * 0.36);
          x.bezierCurveTo(baseX - a.w * 0.06, baseY + a.h * 0.72, baseX - a.w * 0.34, baseY + a.h * 0.42, baseX - a.w * 0.28, baseY + a.h * 0.12);
          x.bezierCurveTo(baseX - a.w * 0.28, baseY - a.h * 0.42, baseX - a.w * 0.12, baseY - a.h * 0.8, baseX, baseY - a.h * 0.66);
          x.fill();
          x.fillStyle = "rgba(255,255,255,0.2)";
          x.beginPath();
          x.arc(baseX - a.w * 0.1, baseY - a.h * 0.18, a.w * 0.1, 0, Math.PI * 2);
          x.fill();
          x.fillStyle = "#4b2e16";
          x.beginPath();
          x.arc(baseX - a.w * 0.13, baseY + a.h * 0.03, a.w * 0.04, 0, Math.PI * 2);
          x.arc(baseX + a.w * 0.08, baseY + a.h * 0.1, a.w * 0.04, 0, Math.PI * 2);
          x.fill();
        }

        // 当たり判定
        if (
          a.x + a.w > p.x &&
          a.x < p.x + p.w &&
          260 - a.h < p.y + p.h
        ) {
          g = true;
        }
      });

      o = o.filter(a => a.x > -150);

      if (g && gameOverTimer === 1) {
        if (d > best) {
          best = d;
          localStorage.setItem("runnerBest", best);
          B.textContent = "最高記録：" + best;
        }
        secondaryStatus.textContent = "ゲームオーバー！ もう一度遊んで挑戦しよう";
      }

      if (g) {
        S.textContent = "ゲームオーバー！ 距離：" + d;
      } else {
        S.textContent = "距離：" + d;
      }
    }

    loop();

  </script>

</body>

</html>
